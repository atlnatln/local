# ============================================================================
# Main Nginx Configuration for VPS Infrastructure
# Handles multiple projects with domain-based routing
# ============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

# Performance settings
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;  # Increased from 1024
    use epoll;
    multi_accept on;
    accept_mutex off;  # Better performance for high-traffic
}

http {
    # Basic Settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Buffer settings - optimized for performance
    client_body_buffer_size 256k;  # Increased from 128k
    client_max_body_size 20m;
    client_header_buffer_size 2k;   # Increased from 1k
    large_client_header_buffers 8 8k;  # Increased from 4 4k
    output_buffers 2 64k;           # Increased from 1 32k
    postpone_output 1460;
    
    # Timeout settings - optimized
    client_header_timeout 60s;     # Increased from 3m
    client_body_timeout 60s;       # Increased from 3m
    send_timeout 60s;              # Increased from 3m
    
    # Proxy settings for better performance
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_buffering on;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Gzip compression - enhanced
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;          # Reduced threshold
    gzip_comp_level 6;             # Better compression ratio
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        font/opentype;
    
    # Security headers map
    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   1y;
        application/javascript     1y;
        ~image/                    1M;
        ~font/                     1y;
        application/x-font-ttf     1y;
        application/font-woff      1y;
        application/font-woff2     1y;
    }
    
    expires $expires;
    
    # FastCGI Cache zones for dynamic content
    fastcgi_cache_path /var/cache/nginx/fastcgi levels=1:2 keys_zone=FASTCGI:100m inactive=60m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    
    # Proxy cache zones for API responses
    proxy_cache_path /var/cache/nginx/proxy levels=1:2 keys_zone=PROXY:100m inactive=60m max_size=1g;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 302 10m;
    proxy_cache_valid 404 1m;
    
    # Rate limiting zones
    # global:  her site icin temel koruma (agresif scanner'lari yavaslatir)
    # web:     web uygulamalari icin (webimar, anka, mathlock)
    # api:     API endpoint'leri icin (daha dusuk, brute force korumasi)
    # admin:   admin/panel path'leri icin (en dusuk)
    limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=15r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=5r/s;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_conn conn_limit_per_ip 20;
    
    # Rate limit exceed response (429 Too Many Requests)
    limit_req_status 429;
    
    # Logging format with cache info
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   '"$http_cf_connecting_ip" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time" '
                   'cache_status="$upstream_cache_status"';
    
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # ssl_stapling removed - causes warnings with some certificates
    
    # Security headers (applied globally)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Retry-After header for rate-limited responses
    limit_req_log_level warn;
    
    # Default server (catches undefined hosts)
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;
        
        # Dummy SSL certificate for default server
        ssl_certificate /etc/nginx/ssl/default/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/default/key.pem;
        
        # Return 444 for undefined hosts
        return 444;
    }
    
    # Include project-specific configurations
    include /etc/nginx/conf.d/*.conf;
}

# Stream module for TCP/UDP proxying (if needed)
stream {
    log_format stream_main '$remote_addr [$time_local] '
                          '$protocol $status $bytes_sent $bytes_received '
                          '$session_time';
    
    access_log /var/log/nginx/stream.log stream_main;
    
    # Include stream configurations if needed
    # include /etc/nginx/stream.d/*.conf;
}