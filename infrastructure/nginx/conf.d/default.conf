server {
    listen 8080 default_server;
    server_name _;
    
    location /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "nginx ok\n";
    }
    
    location /nginx-status {
        access_log off;
        stub_status on;
    }
    
    location / {
        access_log off;
        return 444;  # Drop connection
    }
}