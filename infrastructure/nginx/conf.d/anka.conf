# ============================================================================
# Anka Project Routing Configuration
# Domain: ankadata.com.tr
# Backend: anka project containers
# ============================================================================

# HTTP to HTTPS redirect for Anka
server {
    listen 80;
    server_name ankadata.com.tr www.ankadata.com.tr;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri $uri/ =404;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server for Anka
server {
    listen 443 ssl;
    server_name ankadata.com.tr;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/ankadata.com.tr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/ankadata.com.tr/privkey.pem;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    # ssl_stapling removed - causes warnings
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Logging
    access_log /var/log/nginx/anka_access.log main;
    error_log /var/log/nginx/anka_error.log warn;
    
    # Rate limiting
    limit_req zone=global burst=20 nodelay;
    
    # Health check endpoint
    location /health/ {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "anka healthy\n";
    }
    
    # Proxy all requests to Anka project
    location / {
        # Runtime upstream target (Docker DNS)
        # Not: anka_nginx_prod geçici olarak down olsa bile nginx startup çökmez.
        set $anka_upstream anka_nginx_prod:443;
        proxy_pass https://$anka_upstream;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# Redirect www to non-www (optional)
server {
    listen 443 ssl;
    server_name www.ankadata.com.tr;
    
    ssl_certificate /etc/nginx/ssl/ankadata.com.tr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/ankadata.com.tr/privkey.pem;
    
    return 301 https://ankadata.com.tr$request_uri;
}