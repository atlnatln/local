# ============================================================================
# MathLock APK Dağıtım & OTA Güncelleme Endpoint
# Telefon bu sunucudan güncel APK ve versiyon bilgisini çeker.
# ============================================================================
server {
    listen 80;
    # IP ile erişim için (ileride domain eklenince değiştirilecek)
    server_name 89.252.152.222;

    # Rate limiting
    limit_req zone=web burst=50 nodelay;
    
    # Güvenlik başlıkları
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Versiyon kontrolü (telefon buraya GET atar)
    location = /mathlock/dist/version.json {
        alias /var/www/mathlock/dist/version.json;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # APK indirme
    location /mathlock/dist/ {
        alias /var/www/mathlock/dist/;
        autoindex off;
        # Sadece .apk ve .json dosyalarına izin ver
        location ~* \.(apk)$ {
            add_header Content-Disposition "attachment";
            add_header Content-Type "application/vnd.android.package-archive";
            add_header Cache-Control "no-cache";
        }
        # Diğer dosya tiplerine erişimi kapat
        location ~* ^/mathlock/dist/(?!.*\.(apk|json)$) {
            return 403;
        }
    }

    # ─── Data Endpoint: Sorular, Konular, İstatistikler ─────────────────────
    # GET  /mathlock/data/questions.json → telefon soruları indirir
    # GET  /mathlock/data/topics.json    → telefon konu anlatımlarını indirir
    # POST /mathlock/data/stats.json     → telefon çözüm istatistiklerini yükler
    location /mathlock/data/ {
        alias /var/www/mathlock/data/;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;

        # Sadece .json dosyalarına izin ver
        location ~* ^/mathlock/data/(?!.*\.json$) {
            return 403;
        }

        # stats.json upload (POST/PUT ile telefon gönderir)
        location = /mathlock/data/stats.json {
            # PUT yöntemi ile dosyaya yazma (dav modülü gerektirebilir)
            # Basit yaklaşım: client_body → file
            client_max_body_size 64k;
            dav_methods PUT;
            create_full_put_path on;
            dav_access user:rw group:r all:r;

            # GET için de çalışsın
            default_type application/json;
            add_header Cache-Control "no-cache";
        }
    }

    # Sağlık kontrolü
    location = /mathlock/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "mathlock ok\n";
    }
}
