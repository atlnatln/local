# ============================================================================
# Webimar Project Routing Configuration  
# Domain: tarimimar.com.tr (existing)
# Backend: webimar project containers
# ============================================================================

# HTTP server for Webimar
server {
    listen 80;
    server_name tarimimar.com.tr www.tarimimar.com.tr;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri $uri/ =404;
    }
    
    # HTTP is only for ACME + redirect (loop'u önlemek için direkt 301)
    location / {
        return 301 https://tarimimar.com.tr$request_uri;
    }
}

# HTTPS server for Webimar 
server {
    listen 443 ssl;
    server_name tarimimar.com.tr www.tarimimar.com.tr;
    
    # SSL Configuration (webimar has its own SSL)
    ssl_certificate /etc/nginx/ssl/tarimimar.com.tr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/tarimimar.com.tr/privkey.pem;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Logging
    access_log /var/log/nginx/webimar_access.log main;
    error_log /var/log/nginx/webimar_error.log warn;
    
    # Rate limiting
    limit_req zone=web burst=50 nodelay;
    
    # Health check endpoint
    location /health/ {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "webimar healthy\n";
    }
    
    # API requests — stricter rate limit
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        # Runtime upstream target (Docker DNS)
        set $webimar_upstream webimar-nginx:443;
        proxy_pass https://$webimar_upstream;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
    
    # Proxy all requests to Webimar project
    location / {
        # Runtime upstream target (Docker DNS)
        # Not: webimar-nginx servisi çalışmıyorsa istekler geçici olarak 502 döner,
        # fakat nginx startup aşamasında çökmez.
        set $webimar_upstream webimar-nginx:443;
        proxy_pass https://$webimar_upstream;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}