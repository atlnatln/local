services:
  # =========================================================================
  # Main Nginx Reverse Proxy (Infrastructure level)
  # =========================================================================
  nginx_proxy:
    image: nginx:1.24-alpine
    container_name: vps_nginx_main
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Health check port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - certbot_webroot:/var/www/certbot:ro
      # Default SSL certificates
      - ./ssl/default:/etc/nginx/ssl/default:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vps_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # =========================================================================
  # Certbot for SSL Certificate Management
  # =========================================================================
  certbot:
    image: certbot/certbot:latest
    container_name: vps_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - ./ssl:/output/ssl
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-admin@ankadata.com.tr}
    command: |
      sh -c "while :; do 
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet; 
        sleep 12h; 
      done"
    networks:
      - vps_network
    restart: unless-stopped

  # =========================================================================
  # Monitoring - Prometheus (Optional)
  # =========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: vps_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - vps_network
    profiles:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Monitoring - Grafana (Optional)
  # =========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: vps_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-this-grafana-password}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - vps_network
    profiles:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Log Management - Logrotate
  # =========================================================================
  logrotate:
    image: alpine:latest
    container_name: vps_logrotate
    volumes:
      - nginx_logs:/logs/nginx
      - ./monitoring/logrotate.conf:/etc/logrotate.conf:ro
    command: >
      sh -c "
        echo '0 2 * * * /usr/sbin/logrotate /etc/logrotate.conf' | crontab - &&
        crond -f
      "
    restart: unless-stopped
    networks:
      - vps_network
    profiles:
      - monitoring

# =========================================================================
# Networks
# =========================================================================
networks:
  vps_network:
    external: true
    name: vps_infrastructure_network

# =========================================================================
# Volumes
# =========================================================================
volumes:
  nginx_logs:
    name: vps_nginx_logs
  certbot_certs:
    name: vps_certbot_certs
  certbot_webroot:
    name: vps_certbot_webroot
  prometheus_data:
    name: vps_prometheus_data
  grafana_data:
    name: vps_grafana_data