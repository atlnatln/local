services:
  # =========================================================================
  # PostgreSQL Database (PostgreSQL 14 - stable & production ready)
  # =========================================================================
  postgres:
    image: postgres:14-alpine
    container_name: anka_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-anka}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: Europe/Istanbul
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anka_network

  # =========================================================================
  # Redis (Cache & Task Queue)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: anka_redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anka_network

  # =========================================================================
  # MinIO (S3-compatible file storage, optional)
  # =========================================================================
  minio:
    image: minio/minio:latest
    container_name: anka_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - anka_network

  # =========================================================================
  # Django Backend (Gunicorn + Django 6.0)
  # =========================================================================
  backend:
    build:
      context: ./services/backend
      dockerfile: ../../infra/docker/backend.Dockerfile
    container_name: anka_backend
    environment:
      DJANGO_SETTINGS_MODULE: project.settings.dev
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      GOOGLE_OIDC_CLIENT_ID: ${GOOGLE_OIDC_CLIENT_ID}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANKA_EMAIL_ENRICHMENT_ENABLED: ${ANKA_EMAIL_ENRICHMENT_ENABLED:-true}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-anka}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AWS_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8100:8000"
    volumes:
      - ./services/backend:/app
      - ./docs/turkey-districts.geojson:/app/docs/turkey-districts.geojson:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - anka_network

  # =========================================================================
  # Celery Worker
  # =========================================================================
  celery_worker:
    build:
      context: ./services/backend
      dockerfile: ../../infra/docker/backend.Dockerfile
    container_name: anka_celery_worker
    environment:
      DJANGO_SETTINGS_MODULE: project.settings.dev
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANKA_EMAIL_ENRICHMENT_ENABLED: ${ANKA_EMAIL_ENRICHMENT_ENABLED:-true}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-anka}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./services/backend:/app
      - ./docs/turkey-districts.geojson:/app/docs/turkey-districts.geojson:ro
    depends_on:
      - postgres
      - redis
    command: celery -A celery_app worker -l info
    networks:
      - anka_network

  # =========================================================================
  # Celery Beat (Scheduled Tasks)
  # =========================================================================
  celery_beat:
    build:
      context: ./services/backend
      dockerfile: ../../infra/docker/backend.Dockerfile
    container_name: anka_celery_beat
    environment:
      DJANGO_SETTINGS_MODULE: project.settings.dev
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-anka}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./services/backend:/app
    depends_on:
      - postgres
      - redis
    command: celery -A celery_app beat -l info
    networks:
      - anka_network

  # =========================================================================
  # Next.js Frontend
  # =========================================================================
  frontend:
    build:
      context: ./services/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile
    container_name: anka_frontend
    user: "0:0"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8100
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8100/api
      NEXT_PUBLIC_ENVIRONMENT: development
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      NEXT_INTERNAL_BACKEND_URL: http://backend:8000
    ports:
      - "3100:3000"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    networks:
      - anka_network

  # =========================================================================
  # Nginx Reverse Proxy (Optional, useful for routing)
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: anka_nginx
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_data:/etc/nginx/certs
    depends_on:
      - backend
      - frontend
    networks:
      - anka_network

networks:
  anka_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nginx_data:
