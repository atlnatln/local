openapi: 3.0.3
info:
  title: Anka Platform API
  version: 1.0.0
  description: B2B Data Utility SaaS API with deterministic batch processing
paths:
  /api/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: |-
        Change password - POST /api/auth/change-password/

        Request:
            {
                "old_password": "oldpass123",
                "new_password": "newpass123",
                "new_password2": "newpass123"
            }

        Response:
            {"detail": "Şifre başarıyla değiştirildi."}
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePassword'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordError'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Login endpoint - POST /api/auth/login/

        Request:
            {
                "username": "user@example.com",
                "password": "password123"
            }

        Response:
            {
                "access": "eyJ0eXAiOiJKV1QiLCJhbGc...",
                "refresh": "eyJ0eXAiOiJKV1QiLCJhbGc...",
                "user": {
                    "id": 1,
                    "username": "user@example.com",
                    "email": "user@example.com",
                    "first_name": "John",
                    "last_name": "Doe",
                    "organizations": [...]
                }
            }
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
          description: ''
