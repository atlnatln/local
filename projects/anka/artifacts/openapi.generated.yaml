components:
  schemas:
    Batch:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization:
          type: string
          format: uuid
        created_by:
          type: string
          readOnly: true
        city:
          type: string
          maxLength: 100
        sector:
          type: string
          maxLength: 100
        filters: {}
        sort_rule_version:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        query_hash:
          type: string
          readOnly: true
          description: SHA256 of (city + sector + filters_json + sort_rule_version)
        input_snapshot:
          readOnly: true
        total_records:
          type: integer
          readOnly: true
        processed_records:
          type: integer
          readOnly: true
        error_records:
          type: integer
          readOnly: true
        record_count_estimate:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        estimated_cost:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BatchStatusEnum'
          readOnly: true
        csv_url:
          type: string
          format: uri
          readOnly: true
          nullable: true
        xlsx_url:
          type: string
          format: uri
          readOnly: true
          nullable: true
        metadata:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        started_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/BatchItem'
          readOnly: true
      required:
      - city
      - completed_at
      - created_at
      - created_by
      - csv_url
      - error_records
      - estimated_cost
      - id
      - input_snapshot
      - items
      - metadata
      - organization
      - processed_records
      - query_hash
      - sector
      - started_at
      - status
      - total_records
      - updated_at
      - xlsx_url
    BatchItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        batch:
          type: string
          format: uuid
        firm_id:
          type: string
          maxLength: 255
        firm_name:
          type: string
          maxLength: 255
        is_verified:
          type: boolean
        has_error:
          type: boolean
        error_message:
          type: string
        data: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - batch
      - created_at
      - firm_id
      - firm_name
      - id
      - updated_at
    BatchStatusEnum:
      enum:
      - pending
      - processing
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `processing` - Processing
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    ChangePassword:
      type: object
      description: Change password serializer
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
        new_password2:
          type: string
          writeOnly: true
      required:
      - new_password
      - new_password2
      - old_password
    ChangePasswordError:
      type: object
      properties:
        error:
          type: string
    ChangePasswordResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    CreateOrganization:
      type: object
      description: Create organization serializer
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 20
        website:
          type: string
          format: uri
          maxLength: 200
        country:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
      required:
      - email
      - name
      - slug
    CreditPackage:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization:
          type: string
          format: uuid
          readOnly: true
        balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        total_purchased:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        total_spent:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        total_refunded:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - balance
      - created_at
      - id
      - is_active
      - organization
      - total_purchased
      - total_refunded
      - total_spent
      - updated_at
    CreditPurchase:
      type: object
      properties:
        organization:
          type: string
          format: uuid
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - amount
      - organization
    CreditPurchaseResponse:
      type: object
      properties:
        organization:
          type: string
          format: uuid
        balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        total_purchased:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - balance
      - organization
      - total_purchased
    DecisionEnum:
      enum:
      - accept
      - reject
      - manual
      type: string
      description: |-
        * `accept` - Accept Refund
        * `reject` - Reject
        * `manual` - Manual Review
    Dispute:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization:
          type: string
          format: uuid
        batch:
          type: string
          format: uuid
        reason:
          type: string
          description: Why is the data inaccurate?
        evidence_url:
          type: string
          format: uri
          nullable: true
          maxLength: 200
        evidence_data: {}
        status:
          allOf:
          - $ref: '#/components/schemas/DisputeStatusEnum'
          readOnly: true
        decision:
          readOnly: true
          nullable: true
          oneOf:
