          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: E-posta adresi
          maxLength: 254
        first_name:
          type: string
          title: Adı
          maxLength: 150
        last_name:
          type: string
          title: Soyadı
          maxLength: 150
      required:
      - id
      - username
    UserDetail:
      type: object
      description: Detailed user information with profile
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Kullanıcı adı
          description: Zorunlu. 150 karakter ya da daha az olmalı. Sadece harfler,
            rakamlar ve @/./+/-/_ karakterleri kullanılabilir.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
