  /api/auth/organizations/:
    get:
      operationId: auth_organizations_list
      description: |-
        Organization management viewset

        Endpoints:
            GET    /api/organizations/           - List all organizations
            POST   /api/organizations/           - Create new organization
            GET    /api/organizations/{id}/      - Retrieve organization
            PATCH  /api/organizations/{id}/      - Update organization
            DELETE /api/organizations/{id}/      - Delete organization
            GET    /api/organizations/{id}/members/ - List members
            POST   /api/organizations/{id}/members/ - Add member
      parameters:
      - name: ordering
        required: false
        in: query
        description: Sonuçların sıralanmasında kullanılacak alan.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Sayfalanmış sonuç kümesinde bir sayfa numarası.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Bir arama terimi.
        schema:
          type: string
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationList'
          description: ''
    post:
      operationId: auth_organizations_create
      description: Create new organization
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganization'
