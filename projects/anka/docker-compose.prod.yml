services:
  # =========================================================================
  # PostgreSQL Database (Production ready with persistent data)
  # =========================================================================
  postgres:
    image: postgres:14-alpine
    container_name: anka_postgres_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-anka_prod}
      POSTGRES_USER: ${DB_USER:-anka_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-this-secure-db-password}
      TZ: Europe/Istanbul
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-anka_user}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - anka_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Redis (Cache & Task Queue - Production)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: anka_redis_prod
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - anka_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # MinIO (S3-compatible storage - Production)
  # =========================================================================
  minio:
    image: minio/minio:latest
    container_name: anka_minio_prod
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-change-this-s3-access-key}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-change-this-s3-secret-key}
    volumes:
      - minio_prod_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - anka_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Django Backend (Production with Gunicorn)
  # =========================================================================
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: production
    container_name: anka_backend_prod
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.prod
    env_file:
      - .env.production
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - anka_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # =========================================================================
  # Celery Worker (Background tasks - Production)
  # =========================================================================
  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: production
    container_name: anka_celery_worker_prod
    command: celery -A celery_app worker --loglevel=INFO --concurrency=2
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.prod
    env_file:
      - .env.production
    volumes:
      - media_files:/app/media
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping"]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - anka_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Celery Beat (Scheduled tasks - Production)
  # =========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: production
    container_name: anka_celery_beat_prod
    command: celery -A celery_app beat --loglevel=INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings.prod
    env_file:
      - .env.production
    volumes:
      - ./logs:/app/logs
      - celerybeat_schedule:/app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - anka_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Next.js Frontend (Production build)
  # =========================================================================
  frontend:
    build:
      context: ./services/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile
      target: production
    container_name: anka_frontend_prod
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://ankadata.com.tr/api
      - NEXT_PUBLIC_SITE_URL=https://ankadata.com.tr
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - anka_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Nginx Reverse Proxy (Production SSL)
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: anka_nginx_prod
    ports:
      - "8081:80"   # HTTP for ankadata.com.tr
      - "8443:443"  # HTTPS for ankadata.com.tr
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - anka_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =========================================================================
# Networks
# =========================================================================
networks:
  anka_network:
    driver: bridge
    name: anka_production_network

# =========================================================================
# Volumes (Production data persistence)
# =========================================================================
volumes:
  postgres_prod_data:
    name: anka_postgres_prod_data
  redis_prod_data:
    name: anka_redis_prod_data
  minio_prod_data:
    name: anka_minio_prod_data
  static_files:
    name: anka_static_files
  media_files:
    name: anka_media_files
  celerybeat_schedule:
    name: anka_celerybeat_schedule