# ============================================================================
# Anka Production Nginx Configuration
# Domain: ankadata.com.tr
# SSL: Let's Encrypt certificates
# ============================================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;

# Docker internal DNS resolver for dynamic upstream host re-resolution
resolver 127.0.0.11 valid=30s ipv6=off;

# Upstream servers
upstream anka_backend {
    zone anka_backend_zone 64k;
    server backend:8000 resolve max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream anka_frontend {
    zone anka_frontend_zone 64k;
    server frontend:3000 resolve max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Gzip compression
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name ankadata.com.tr www.ankadata.com.tr;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri $uri/ =404;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name ankadata.com.tr www.ankadata.com.tr;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/ankadata.com.tr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/ankadata.com.tr/privkey.pem;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; font-src 'self' data: https:; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; connect-src 'self' https:; frame-src 'self' https://accounts.google.com; frame-ancestors 'none';" always;
    
    # Client settings
    client_max_body_size 20M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Logging
    access_log /var/log/nginx/anka_access.log combined;
    error_log /var/log/nginx/anka_error.log warn;
    
    # Health check endpoint
    location /health/ {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Public API health endpoint (avoid backend SSL redirect loops behind proxies)
    location = /api/health/ {
        access_log off;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"status":"ok"}';
    }
    
    # Django API routes
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://anka_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Headers
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
    
    # Django admin
    location /admin/ {
        limit_req zone=api burst=10 nodelay;
        
        proxy_pass http://anka_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static files (served by nginx)
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Security for static files
        location ~* \.(js|css)$ {
            add_header X-Content-Type-Options nosniff;
        }
    }
    
    # Media files (user uploads)
    location /media/ {
        alias /var/www/media/;
        expires 1M;
        add_header Cache-Control "public";
        add_header Vary Accept-Encoding;
        
        # Security: no script execution in media
        location ~* \.(php|py|pl|sh)$ {
            deny all;
        }
    }
    
    # Next.js application (all other routes)
    location / {
        limit_req zone=web burst=60 nodelay;
        
        proxy_pass http://anka_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Next.js specific
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Auth page should never be edge/browser-cached (prevents stale env-driven login UI)
    location = /login {
        limit_req zone=web burst=60 nodelay;

        proxy_pass http://anka_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://anka_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }
    
    # Favicon and robots
    location = /favicon.ico {
        proxy_pass http://anka_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location = /robots.txt {
        proxy_pass http://anka_frontend;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # Security: block common exploit attempts
    location ~* \.(env|git|svn|htaccess|htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Security: block PHP and other script files
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Redirect www to non-www (optional)
server {
    listen 443 ssl http2;
    server_name www.ankadata.com.tr;
    
    ssl_certificate /etc/nginx/ssl/ankadata.com.tr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/ankadata.com.tr/privkey.pem;
    
    return 301 https://ankadata.com.tr$request_uri;
}