name: E2E (Playwright)

on:
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: npx --yes playwright@1.41.2 install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:3100
        run: npx --yes playwright@1.41.2 test tests/e2e/playwright

      - name: Collect logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose logs --no-color > artifacts/docker-compose.log || true

      - name: Shutdown
        if: always()
        run: docker compose down -v

