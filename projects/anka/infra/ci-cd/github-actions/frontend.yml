name: Frontend

on:
  push:
    paths:
      - "services/frontend/**"
      - "infra/ci-cd/github-actions/frontend.yml"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "services/frontend/**"
      - "infra/ci-cd/github-actions/frontend.yml"
      - ".github/workflows/frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install
        working-directory: services/frontend
        run: npm ci

      - name: Lint
        working-directory: services/frontend
        run: npm run lint

      - name: Type check
        working-directory: services/frontend
        run: npm run type-check

      - name: Build
        working-directory: services/frontend
        run: npm run build

