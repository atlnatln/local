name: Backend

on:
  push:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "services/backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/backend/requirements-base.txt
            services/backend/requirements.txt
            services/backend/pyproject.toml

      - name: Install dependencies
        working-directory: services/backend
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-base.txt -r requirements.txt
          pip install pytest-django pytest-cov isort

      - name: Lint (black)
        working-directory: services/backend
        run: black --check .

      - name: Lint (isort)
        working-directory: services/backend
        run: isort --check-only .

      - name: Lint (flake8)
        working-directory: services/backend
        run: flake8 .

      - name: Tests (pytest - SQLite)
        working-directory: services/backend
        env:
          DJANGO_SETTINGS_MODULE: project.settings.test
        run: pytest

  test-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: anka_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/backend/requirements-base.txt
            services/backend/requirements.txt
            services/backend/pyproject.toml

      - name: Install dependencies
        working-directory: services/backend
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-base.txt -r requirements.txt
          pip install pytest-django pytest-cov psycopg2-binary

      - name: Run migrations
        working-directory: services/backend
        env:
          DJANGO_SETTINGS_MODULE: project.settings.test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anka_test
        run: python manage.py migrate

      - name: Tests (pytest - PostgreSQL)
        working-directory: services/backend
        env:
          DJANGO_SETTINGS_MODULE: project.settings.test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/anka_test
        run: pytest --tb=short

