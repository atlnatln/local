# ============================================================================
# MathLock Play — mathlock.com.tr
# Web sitesi + API backend + Data endpoint'leri
# VPS üzerinde: /home/akn/vps/infrastructure/nginx/conf.d/mathlock-play.conf
# ============================================================================

# HTTP → HTTPS yönlendirmesi
server {
    listen 80;
    server_name mathlock.com.tr www.mathlock.com.tr;
    return 301 https://mathlock.com.tr$request_uri;
}

# HTTPS ana sunucu
server {
    listen 443 ssl http2;
    server_name mathlock.com.tr;

    # SSL sertifikaları (host'tan container'a mount edilir)
    ssl_certificate     /etc/nginx/ssl/mathlock.com.tr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/mathlock.com.tr/privkey.pem;

    # Modern SSL konfigürasyonu
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Güvenlik başlıkları
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Web Sitesi (Privacy Policy, Support) ────────────────────────────────
    root /var/www/mathlock/website;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /privacy {
        try_files /privacy.html =404;
        default_type text/html;
    }

    location = /support {
        try_files /support.html =404;
        default_type text/html;
    }

    # ─── Backend API (Django) — unix socket üzerinden ────────────────────────
    location /api/mathlock/ {
        proxy_pass http://unix:/var/run/mathlock/gunicorn.sock:/api/mathlock/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── Data Endpoint: Sorular, Konular, İstatistikler ─────────────────────
    location /mathlock/data/ {
        alias /var/www/mathlock/data/;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;

        location ~* ^/mathlock/data/(?!.*\.json$) {
            return 403;
        }

        location = /mathlock/data/stats.json {
            client_max_body_size 64k;
            dav_methods PUT;
            create_full_put_path on;
            dav_access user:rw group:r all:r;
            default_type application/json;
            add_header Cache-Control "no-cache";
        }
    }

    # ─── APK Dağıtımı (OTA) ─────────────────────────────────────────────────
    location /mathlock/dist/ {
        alias /var/www/mathlock/dist/;
        autoindex off;
        location ~* \.(apk)$ {
            add_header Content-Disposition "attachment";
            add_header Content-Type "application/vnd.android.package-archive";
            add_header Cache-Control "no-cache";
        }
        location ~* ^/mathlock/dist/(?!.*\.(apk|json)$) {
            return 403;
        }
    }

    # Sağlık kontrolü
    location = /mathlock/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "mathlock ok\n";
    }

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# www → non-www yönlendirmesi
server {
    listen 443 ssl http2;
    server_name www.mathlock.com.tr;

    ssl_certificate     /etc/nginx/ssl/mathlock.com.tr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/mathlock.com.tr/privkey.pem;

    return 301 https://mathlock.com.tr$request_uri;
}
