services:
  mathlock_db:
    image: postgres:16-alpine
    container_name: mathlock_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mathlock
      - POSTGRES_USER=mathlock
      - POSTGRES_PASSWORD=${MATHLOCK_DB_PASSWORD:?MATHLOCK_DB_PASSWORD required}
    volumes:
      - mathlock_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathlock"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

  mathlock_redis:
    image: redis:7-alpine
    container_name: mathlock_redis
    ports:
      - "6379:6379"
    networks:
      - default
    restart: unless-stopped

  # NOT: mathlock_backend ve mathlock_celery artık konteyner dışında
  # host üzerinde systemd servisleri olarak çalışıyor.
  # Sebep: kimi-cli host'ta kurulu ve login olmuş durumda,
  # konteyner içinden erişilemiyor.
  # Bakınız: docs/VPS_INTEGRATION.md

volumes:
  mathlock_pgdata:
    name: mathlock_pgdata

networks:
  default:
