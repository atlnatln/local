name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webimar-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'webimar-api/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (pytest)
        run: |
          pytest -q --ignore=tests/integration/ || true

  nextjs-build:
    name: Next.js build (webimar-nextjs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webimar-nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps & build
        run: |
          npm install --legacy-peer-deps
          npm run build

  react-build:
    name: React SPA build (webimar-react)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./webimar-react
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build React SPA
        run: |
          npm install --legacy-peer-deps
          CI=false npm run build
