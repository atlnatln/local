name: Otomatik Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu klonla
        uses: actions/checkout@v4

      - name: Sunucuya deploy et
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            cd /home/akn/webimar
            
            # GIT REPOSITORY İZİNLERİNİ DÜZELT (kritik - pull/fetch işlemleri için)
            sudo chown -R $(whoami):$(whoami) .git 2>/dev/null || true
            chmod -R u+rw .git 2>/dev/null || true
            
            # ENV DOSYALARI İZİNLERİNİ DÜZELT (production env files)
            sudo chown $(whoami):$(whoami) webimar-nextjs/.env.production 2>/dev/null || true
            sudo chown $(whoami):$(whoami) webimar-react/.env.production 2>/dev/null || true
            chmod u+w webimar-nextjs/.env.production 2>/dev/null || true
            chmod u+w webimar-react/.env.production 2>/dev/null || true
            
            # Permissions sorununu çöz - TÜM build/static klasörlerini temizle
            sudo chown -R $(whoami):$(whoami) webimar-react/build 2>/dev/null || true
            sudo chown -R $(whoami):$(whoami) webimar-nextjs/.next 2>/dev/null || true
            sudo chown -R $(whoami):$(whoami) webimar-nextjs/out 2>/dev/null || true
            sudo chown -R $(whoami):$(whoami) webimar-api/staticfiles/nextjs 2>/dev/null || true
            sudo chown -R $(whoami):$(whoami) webimar-api/staticfiles/static 2>/dev/null || true
            sudo chown -R $(whoami):$(whoami) webimar-api/staticfiles 2>/dev/null || true
            chmod -R u+w webimar-react/build 2>/dev/null || true
            chmod -R u+w webimar-nextjs/.next 2>/dev/null || true
            chmod -R u+w webimar-nextjs/out 2>/dev/null || true
            chmod -R u+w webimar-api/staticfiles 2>/dev/null || true
            # Fallback: sudo rm -rf ile zorla sil - staticfiles/nextjs dahil
            sudo rm -rf webimar-react/build webimar-nextjs/.next webimar-nextjs/out webimar-api/venv 2>/dev/null || true
            sudo rm -rf webimar-api/staticfiles/nextjs 2>/dev/null || true
            
            # set -e burada başlat (temizlik işlemlerinden sonra)
            set -e
            
            # Git index'i temizle (stale references'ları at)
            git update-index --refresh 2>/dev/null || true
            
            # Tüm tracked değişiklikleri sil
            git reset --hard HEAD
            
            # Untracked dosyaları sil (env files, logs ve staticfiles hariç)
            git clean -fdx \
              --exclude=webimar-api/.env \
              --exclude=webimar-api/logs/ \
              --exclude=webimar-api/staticfiles/ \
              --exclude=webimar-nextjs/.env.production \
              --exclude=webimar-react/.env.production
            
            # Fetch ve reset
            git fetch origin main
            git reset --hard origin/main

            # Django API Deploy
            cd webimar-api
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            . venv/bin/activate
            python3 -m pip install --upgrade pip
            python3 -m pip install -r requirements.txt

            # Production .env dosyasını güvenli şekilde oluştur
            echo "DEBUG=False" > .env
            echo "DEVELOPMENT_BYPASS_LIMITS=False" >> .env
            echo "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env
            echo "ALLOWED_HOSTS=localhost,127.0.0.1,tarlada-ruhsat.com.tr,tarimimar.com.tr,89.252.152.222,*" >> .env
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
            echo "SECURE_SSL_REDIRECT=True" >> .env
            echo "SECURE_PROXY_SSL_HEADER=HTTP_X_FORWARDED_PROTO,https" >> .env
            echo "SESSION_COOKIE_SECURE=True" >> .env
            echo "CSRF_COOKIE_SECURE=True" >> .env
            echo "CORS_ALLOW_ALL_ORIGINS=True" >> .env
            echo "APPEND_SLASH=True" >> .env
            echo "EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend" >> .env
            echo "EMAIL_HOST=${{ secrets.DJANGO_EMAIL_HOST }}" >> .env
            echo "EMAIL_PORT=587" >> .env
            echo "EMAIL_USE_TLS=True" >> .env
            echo "EMAIL_HOST_USER=${{ secrets.DJANGO_EMAIL_HOST_USER }}" >> .env
            echo "EMAIL_HOST_PASSWORD=${{ secrets.DJANGO_EMAIL_HOST_PASSWORD }}" >> .env
            echo "DEFAULT_FROM_EMAIL=info@tarimimar.com.tr" >> .env
            
            # Google OAuth ayarları (Production için doğru redirect URI)
            echo "GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" >> .env
            echo "GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}" >> .env
            echo "GOOGLE_OAUTH_REDIRECT_URI=https://tarimimar.com.tr/api/accounts/google/callback/" >> .env
            
            # Frontend base URL - Next.js ana sayfa için
            echo "FRONTEND_BASE_URL=https://tarimimar.com.tr" >> .env

            # Django migrate ve static işlemleri
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh

                        # React Frontend Deploy
            cd ../webimar-react
            npm install --legacy-peer-deps
            
            # .env.production dosyasını temizle (permission hatasını önlemek için)
            sudo rm -f .env.production || true
            
            echo "REACT_APP_API_BASE_URL=https://tarimimar.com.tr/api" > .env.production
            echo "REACT_APP_BACKEND_URL=https://tarimimar.com.tr" >> .env.production
            echo "REACT_APP_BASE_URL=https://tarimimar.com.tr" >> .env.production
            echo "REACT_APP_NEXTJS_URL=https://tarimimar.com.tr" >> .env.production
            echo "REACT_APP_ENVIRONMENT=production" >> .env.production
            echo "NODE_ENV=production" >> .env.production
            echo "GENERATE_SOURCEMAP=false" >> .env.production
            echo "BUILD_TIME=$(date +%s)" >> .env.production
            rm -rf build
            npm run build

            # React build/static içeriğini kopyala
            rm -rf ../webimar-api/staticfiles/static
            cp -r build/static/* ../webimar-api/staticfiles/

            # Next.js Frontend Deploy (Static Generation)
            cd ../webimar-nextjs
            npm install
            # Clean potential leftover cache (permission issues can happen when caching build on runner)
            rm -rf .next/cache || true
            
            # .env.production dosyasını temizle (permission hatasını önlemek için)
            sudo rm -f .env.production || true
            
            # Production environment ayarları
            echo "NEXT_PUBLIC_API_BASE_URL=https://tarimimar.com.tr/api" > .env.production
            echo "NEXT_PUBLIC_BASE_URL=https://tarimimar.com.tr" >> .env.production
            echo "NEXT_PUBLIC_REACT_SPA_URL=https://tarimimar.com.tr" >> .env.production
            echo "API_URL=http://localhost:8000" >> .env.production
            echo "NODE_ENV=production" >> .env.production
            echo "GENERATE_SOURCEMAP=false" >> .env.production
            
            # Google Analytics 4 - Production (GitHub Secrets'tan gelecek)
            echo "NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }}" >> .env.production
            
            # Google Maps API Key (opsiyonel)
            # echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> .env.production
            
            # Next.js static build (output: 'export' kullanıyor)
            rm -rf .next
            rm -rf out
            npm run build:prod
            
            # Next.js static dosyalarını nginx konumuna kopyala
            rm -rf /home/akn/webimar/webimar-api/staticfiles/nextjs
            mkdir -p /home/akn/webimar/webimar-api/staticfiles/nextjs
            
            # out klasörü export ile otomatik oluşturuluyor
            if [ -d "out" ]; then
              cp -r out/* /home/akn/webimar/webimar-api/staticfiles/nextjs/
              echo "✅ Next.js static export kopyalandı"
            else
              echo "⚠️  Export başarısız, server build dosyalarını kopyalıyor"
              # Fallback: server build dosyalarını kopyala
              cp -r .next/static /home/akn/webimar/webimar-api/staticfiles/nextjs/_next/ || echo "Static dosyalar kopyalanamadı"
            fi
            
            # İzinleri düzelt (akn kullanıcısı zaten owner, chown atlanabilir)
            chmod -R 755 /home/akn/webimar/webimar-api/staticfiles/nextjs || echo "chmod başarısız oldu ama devam ediliyor"

            # Django collectstatic çalıştır
            cd /home/akn/webimar/webimar-api
            source venv/bin/activate
            python manage.py collectstatic --noinput
            
            # Django API servisini yeniden başlat
            echo "🔄 Django API servisi yeniden başlatılıyor..."
            if sudo systemctl restart webimar-api; then
              echo "✅ Django API servisi başlatıldı"
              sleep 2
              # Servisin gerçekten çalıştığını kontrol et
              if sudo systemctl is-active --quiet webimar-api; then
                echo "✅ Django API servisi çalışıyor"
              else
                echo "⚠️ Django API servisi başlatılamadı!"
                sudo journalctl -u webimar-api -n 20 --no-pager
              fi
            else
              echo "❌ Django API servisi başlatma hatası!"
              sudo journalctl -u webimar-api -n 20 --no-pager
            fi
            
            # Ana dizine dön
            cd /home/akn/webimar

            # Nginx konfigürasyonunu güncelle ve reload et
            chmod +x update-nginx.sh
            ./update-nginx.sh

            echo "✅ Deploy dosya işlemleri tamamlandı!"
            echo "📝 Nginx manuel reload gerekli: sudo systemctl reload nginx"
