# Docker Compose Override for Local Development
# This file allows local customizations without modifying main compose files
# Add to .gitignore to keep local-only

version: '3.8'

services:
  # Development overrides for API
  webimar-api:
    environment:
      - DEBUG=True
      - LOG_LEVEL=DEBUG
    # Uncomment to expose for debugging tools
    # ports:
    #   - "8000:8001"  # Expose API for external tools
    volumes:
      - ./webimar-api:/app  # Hot reload in development
    
  # Development overrides for database  
  postgres:
    # Uncomment to expose for database tools (pgAdmin, etc.)
    # ports:
    #   - "5432:5432"  # ⚠️ Only for local development!
    environment:
      - POSTGRES_DB=webimar_api_dev  # Separate dev database
    
  # Development overrides for Redis
  redis:
    # Uncomment to expose for Redis tools
    # ports:
    #   - "6379:6379"  # ⚠️ Only for local development!
    command: redis-server --appendonly yes --appendfsync everysec
    
  # Optional: Add development tools
  # adminer:
  #   image: adminer:4.8.1
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     ADMINER_DESIGN: 'hydra'