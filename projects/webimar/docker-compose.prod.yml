# ========================================
# Webimar Production Docker Compose
# Tüm servisleri tek compose ile yönetir
# ========================================

services:
  # ========================================
  # Nginx Reverse Proxy
  # ========================================
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    image: webimar-nginx:latest
    container_name: webimar-nginx
    volumes:
      # Only SSL certs are mounted, nginx.conf is baked into image
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - webimar-api
      - webimar-react
      - webimar-nextjs
    networks:
      - webimar-network
      - vps-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # Django API Backend
  # ========================================
  webimar-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: webimar-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=False
      - GUNICORN_WORKERS=2
      - GUNICORN_MAX_REQUESTS=1000
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL required}
      - CACHE_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,tarimimar.com.tr,webimar-api,webimar-nginx,89.252.152.222}
      - CORS_ALLOWED_ORIGINS=https://tarimimar.com.tr,http://localhost
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-https://tarimimar.com.tr/api/accounts/google/callback/}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://tarimimar.com.tr}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-info@tarimimar.com.tr}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - api_staticfiles:/app/staticfiles
      - api_media:/app/media
      - api_database:/app/data
    networks:
      - webimar-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/calculations/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ========================================
  # React Frontend SPA
  # ========================================
  webimar-react:
    build:
      context: .
      dockerfile: docker/Dockerfile.react
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-https://tarimimar.com.tr/api}
        REACT_APP_NEXTJS_URL: ${REACT_APP_NEXTJS_URL:-https://tarimimar.com.tr}
    container_name: webimar-react
    networks:
      - webimar-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # Next.js SSG Frontend
  # ========================================
  webimar-nextjs:
    build:
      context: .
      dockerfile: docker/Dockerfile.nextjs
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://tarimimar.com.tr/api}
        NEXT_PUBLIC_REACT_SPA_URL: ${NEXT_PUBLIC_REACT_SPA_URL:-https://tarimimar.com.tr/hesaplama}
    container_name: webimar-nextjs
    networks:
      - webimar-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # PostgreSQL Database (Optional)
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: webimar-postgres
    environment:
      # Not: Volume silinmediği sürece bu değer yalnızca ilk init'te kullanılır.
      POSTGRES_DB: ${POSTGRES_DB:-webimar}
      POSTGRES_USER: ${POSTGRES_USER:-webimar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webimar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webimar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Redis Cache - Production Performance Optimization
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: webimar-redis
    command: redis-server --save 20 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - webimar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  webimar-network:
    driver: bridge
  vps-network:
    external: true
    name: vps_infrastructure_network

volumes:
  api_staticfiles:
    # Varsayılan compose adı ile uyumlu sabit volume ismi.
    name: webimar_api_staticfiles
  api_media:
    # Kullanıcı upload'ları vb. için sabit volume ismi.
    name: webimar_api_media
  api_database:
    # API'nin yerel veri/log dosyaları için sabit volume ismi.
    name: webimar_api_database
  postgres_data:
    # DB verisinin compose dosyası/stack değişimlerinde “yeni volume” sanılıp kaybolmaması için sabit isim.
    name: webimar_postgres_data
  redis_data:
