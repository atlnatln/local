services:
  # Nginx Reverse Proxy - Load Balancer
  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - webimar-api
      - webimar-nextjs
      - webimar-react
    restart: unless-stopped

  # Backend API - Development
  webimar-api:
    build: ./webimar-api
    ports:
      - "8001:8001"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://webimar:webimar123@postgres:5432/webimar_api
      - REDIS_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=localhost,127.0.0.1,webimar-api
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost/api/accounts/google/callback/}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./webimar-nextjs/public/havza_urun_desen.json:/app/havza_urun_desen.json:ro
    restart: unless-stopped

  # Frontend - Development Mode
  webimar-react:
    build: 
      context: ./webimar-react
      target: development
    ports:
      - "3001:3001"
    environment:
      - REACT_APP_API_URL=http://localhost/api
      - REACT_APP_API_BASE_URL=http://localhost/api
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - PORT=3001
      - REACT_APP_ROUTER_BASENAME=/hesaplama
      - REACT_APP_NEXTJS_URL=http://localhost
    volumes:
      - ./webimar-react/src:/app/src
      - ./webimar-react/public:/app/public
    restart: unless-stopped

  # Next.js SEO/Marketing - Development Mode  
  webimar-nextjs:
    build:
      context: ./webimar-nextjs
      target: development
    ports:
      - "3000:3000" 
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
      - NEXT_PUBLIC_NEXTJS_URL=${NEXT_PUBLIC_NEXTJS_URL:-http://localhost}
      - NEXT_PUBLIC_REACT_SPA_URL=${NEXT_PUBLIC_REACT_SPA_URL:-/hesaplama}
    volumes:
      - ./webimar-nextjs/src:/app/src
      - ./webimar-nextjs/pages:/app/pages
      - ./webimar-nextjs/components:/app/components
      - ./webimar-nextjs/public:/app/public
    restart: unless-stopped

  # PostgreSQL - Production
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: webimar_api
      POSTGRES_USER: webimar
      POSTGRES_PASSWORD: webimar123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Redis - Production Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning

volumes:
  postgres_data: