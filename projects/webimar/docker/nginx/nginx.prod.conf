# ========================================
# Webimar Production Nginx Configuration
# Optimized for production deployment
# ========================================

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;

    # Docker internal DNS (container name -> IP) can change on restart.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Production upstream servers
    upstream api_backend {
        zone api_backend 64k;
        server webimar-api:8000;
        keepalive 32;
    }

    upstream react_frontend {
        zone react_frontend 64k;
        server webimar-react:80;
        keepalive 16;
    }

    upstream nextjs_frontend {
        zone nextjs_frontend 64k;
        server webimar-nextjs:3000;
        keepalive 16;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name tarimimar.com.tr www.tarimimar.com.tr;
        
        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (for Docker healthcheck)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Everything else redirect to HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name www.tarimimar.com.tr;
        
        # SSL configuration
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        
        # Modern configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        
        return 301 https://tarimimar.com.tr$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name tarimimar.com.tr;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Modern configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Legacy URL redirects (GSC cleanup)
        location = /tr {
            return 301 https://tarimimar.com.tr/;
        }

        location ~ ^/tr/(.*)$ {
            return 301 https://tarimimar.com.tr/$1;
        }

        location ~ ^/hesaplama/([a-z0-9-]+)/?$ {
            return 301 https://tarimimar.com.tr/$1/;
        }

        location = /sitemap.xml.broken {
            return 301 https://tarimimar.com.tr/sitemap.xml;
        }

        location = /sitemap.xml.backup {
            return 301 https://tarimimar.com.tr/sitemap.xml;
        }

        location = /cevre-duzeni-planlari/%5BplanId%5D {
            return 301 https://tarimimar.com.tr/cevre-duzeni-planlari/;
        }

        location = /cevre-duzeni-planlari/il/%5BilSlug%5D {
            return 301 https://tarimimar.com.tr/cevre-duzeni-planlari/;
        }

        location = /documents/ibb-plan-notlari {
            return 301 https://tarimimar.com.tr/documents/izmir-buyuksehir-plan-notlari/;
        }

        # Django admin
        location /admin/ {
            proxy_pass http://api_backend/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django API
        location /api/ {
            proxy_pass http://api_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # React hesaplama routes
        location /hesaplama/ {
            proxy_pass http://react_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js pages
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        # Next.js static assets
        location /_next/ {
            proxy_pass http://nextjs_frontend/_next/;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Static assets for React app served through nginx
        location /static/ {
            proxy_pass http://react_frontend/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # KML files (served from React public root)
        location ~ \.kml$ {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Direct structure type routes → Next.js (SEO pages)
        location ~ ^/(aricilik-planlama|ciceklenme-takvimi|bag-evi|sera|aricilik|su-kuyulari|agil-kucukbas|besi-sigirciligi|evcil-hayvan|hara|hububat-silo|ipek-bocekciligi|kaz-ordek|kumes-etci|kumes-gezen|kumes-hindi|kumes-yumurtaci|kurutma-tesisi|lisansli-depo|mantar-tesisi|meyve-sebze-kurutma|soguk-hava-deposu|solucan-tesisi|su-depolama|sut-sigirciligi|tarimsal-depo|yikama-tesisi|zeytinyagi-fabrikasi|zeytinyagi-uretim-tesisi|gubre-cukuru-hesaplama|sigir-ahiri-kapasite-hesaplama|buzagi-destegi-hesaplama|cevre-duzeni-planlari|documents|mevzuat)(/.*)?$ {
            proxy_pass http://nextjs_frontend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Favicon
        location = /favicon.ico {
            proxy_pass http://nextjs_frontend/favicon.ico;
            expires 1y;
        }

        # robots.txt - served directly from nginx for reliability (Google crawl stability)
        location = /robots.txt {
            root /usr/share/nginx/html;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # Sitemap - proxy to Next.js (dynamic content)
        location = /sitemap.xml {
            proxy_pass http://nextjs_frontend/sitemap.xml;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }
}