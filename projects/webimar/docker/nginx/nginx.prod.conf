# ========================================
# Webimar Production Nginx Configuration
# Optimized for production deployment
# ========================================

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;

    # Docker internal DNS (container name -> IP) can change on restart.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Production upstream servers
    upstream api_backend {
        zone api_backend 64k;
        server webimar-api:8000;
        keepalive 32;
    }

    upstream react_frontend {
        zone react_frontend 64k;
        server webimar-react:80;
        keepalive 16;
    }

    upstream nextjs_frontend {
        zone nextjs_frontend 64k;
        server webimar-nextjs:3000;
        keepalive 16;
    }

    # HTTP server - main infrastructure nginx handles SSL termination
    server {
        listen 80;
        server_name tarimimar.com.tr www.tarimimar.com.tr _;

        # Health check (for Docker healthcheck)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # (Optional) ACME challenge path kept for compatibility; main nginx usually serves it.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Security headers (safe defaults)
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Django admin
        location /admin/ {
            proxy_pass http://api_backend/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Django API
        location /api/ {
            proxy_pass http://api_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # React hesaplama routes
        location /hesaplama/ {
            proxy_pass http://react_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Next.js pages
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
        }

        # Next.js static assets
        location /_next/ {
            proxy_pass http://nextjs_frontend/_next/;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Static assets for React app served through nginx
        location /static/ {
            proxy_pass http://react_frontend/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Direct structure type routes → Next.js (SEO pages)
        location ~ ^/(aricilik-planlama|ciceklenme-takvimi|bag-evi|sera|aricilik|su-kuyulari|agil-kucukbas|besi-sigirciligi|evcil-hayvan|hara|hububat-silo|ipek-bocekciligi|kaz-ordek|kumes-etci|kumes-gezen|kumes-hindi|kumes-yumurtaci|kurutma-tesisi|lisansli-depo|mantar-tesisi|meyve-sebze-kurutma|soguk-hava-deposu|solucan-tesisi|su-depolama|sut-sigirciligi|tarimsal-depo|yikama-tesisi|zeytinyagi-fabrikasi|zeytinyagi-uretim-tesisi|gubre-cukuru-hesaplama|sigir-ahiri-kapasite-hesaplama|cevre-duzeni-planlari|documents|mevzuat)(/.*)?$ {
            proxy_pass http://nextjs_frontend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Favicon and robots
        location = /favicon.ico {
            proxy_pass http://nextjs_frontend/favicon.ico;
            expires 1y;
        }

        location = /robots.txt {
            proxy_pass http://nextjs_frontend/robots.txt;
            expires 1d;
        }
    }
}