# ========================================
# Webimar Nginx Reverse Proxy
# Main entry point for all services
# ========================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;

    # Docker internal DNS (container name -> IP) can change on restart.
    # Use resolver + upstream resolve to avoid stale upstream IPs causing 502.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Upstream servers
    upstream api_backend {
        zone api_backend 64k;
        server webimar-api:8001;
        keepalive 32;
    }

    upstream react_frontend {
        zone react_frontend 64k;
        server webimar-react:3001;
        keepalive 16;
    }

    upstream nextjs_frontend {
        zone nextjs_frontend 64k;
        server webimar-nextjs:3000;
        keepalive 16;
    }

    # HTTP server for reverse proxy (infrastructure nginx → here)
    server {
        listen 80;
        server_name tarimimar.com.tr www.tarimimar.com.tr;
        
        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (for Docker healthcheck)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # React static files (CSS/JS) - must come before Django static
        location ~ ^/static/(js|css)/ {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Django API
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
        }

        # Next.js public assets
        location ~ ^/(havza_urun_desen\.json|yenidestek_sorular\.md)$ {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
        }

        # React SPA
        location /hesaplama/ {
            proxy_pass http://react_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Next.js
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
        }

        # Next.js static
        location /_next/ {
            proxy_pass http://nextjs_frontend/_next/;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # HTTP server for IP access (development/testing)
    server {
        listen 80 default_server;
        server_name _;

        # Security: Block sensitive files and common attack paths
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~ \.(env|git|svn|hg|htpasswd|htaccess|sql|backup|bak|old|sh|py|exe|dll)$ {
            deny all;
            return 404;
        }

        location ~ (cgi-bin|device\.rsp|setup|install|config|phpinfo|webshell|eval-stdin|xmlrpc) {
            deny all;
            return 404;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django API
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        # Next.js public assets for havza modeli
        location ~ ^/(havza_urun_desen\.json|yenidestek_sorular\.md)$ {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
        }

        # React hesaplama routes
        location /hesaplama/ {
            proxy_pass http://react_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js pages
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
        }

        # Next.js static assets
        location /_next/ {
            proxy_pass http://nextjs_frontend/_next/;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Security: Block sensitive files and common attack paths
        location ~ /\. {
            deny all;
            return 404;
        }

        location ~ \.(env|git|svn|hg|htpasswd|htaccess|sql|backup|bak|old|sh|py|exe|dll)$ {
            deny all;
            return 404;
        }

        location ~ (cgi-bin|device\.rsp|setup|install|config|phpinfo|webshell|eval-stdin|xmlrpc) {
            deny all;
            return 404;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Legacy URL redirects - Old document names (404 fix)
        location = /documents/ibb-plan-notlari {
            return 301 https://tarimimar.com.tr/documents/izmir-buyuksehir-plan-notlari;
        }

        # Eski hesaplama URL'leri yönlendirmesi (GSC 404 düzeltme)
        # Redirect /hesaplama/{slug} → /{slug}/ (for all calculation pages)
        location ~ ^/hesaplama/([a-z0-9-]+)/?$ {
            return 301 https://tarimimar.com.tr/$1/;
        }

        # Eski documents URL'leri yönlendirmesi
        location ~ ^/docs/(.*)$ {
            return 301 https://tarimimar.com.tr/documents/$1;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }

        # Django API
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # CORS
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        }

        # React static files (CSS/JS) - must come before Django static
        location ~ ^/static/(js|css)/ {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Django static files
        location /static/ {
            proxy_pass http://api_backend/static/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # React SPA static files (alternative path)
        location /hesaplama/static/ {
            rewrite ^/hesaplama/static/(.*)$ /static/$1 break;
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # React SPA - Auth pages only (structure types go to Next.js)
        location ~ ^/(account|login|register|logout)(/|$) {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # React SPA - Auth sayfaları
        location /auth/ {
            proxy_pass http://react_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js - Ana sayfa ve SEO sayfaları
        location = / {
            proxy_pass http://nextjs_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js static assets
        location /_next/ {
            proxy_pass http://nextjs_frontend/_next/;
            expires 365d;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # Next.js - Landing sayfaları (yapı türleri)
        location ~ ^/(aricilik-planlama|ciceklenme-takvimi|bag-evi|sera|aricilik|su-kuyulari|agil-kucukbas|besi-sigirciligi|evcil-hayvan|hara|hububat-silo|ipek-bocekciligi|kaz-ordek|kumes-etci|kumes-gezen|kumes-hindi|kumes-yumurtaci|kurutma-tesisi|lisansli-depo|mantar-tesisi|meyve-sebze-kurutma|soguk-hava-deposu|solucan-tesisi|su-depolama|sut-sigirciligi|tarimsal-depo|yikama-tesisi|zeytinyagi-fabrikasi|zeytinyagi-uretim-tesisi|gubre-cukuru-hesaplama|sigir-ahiri-kapasite-hesaplama|cevre-duzeni-planlari|havza-bazli-destekleme-modeli|documents|mevzuat)(/.*)?$ {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SEO files
        location ~ ^/(sitemap\.xml|robots\.txt|manifest\.json|sw\.js|favicon\.svg|favicon\.ico|favicon-16x16\.svg|favicon-32x32\.svg|apple-touch-icon\.svg)$ {
            proxy_pass http://nextjs_frontend;
            expires 1d;
        }

        # Next.js public assets for havza modeli
        location ~ ^/(havza_urun_desen\.json|yenidestek_sorular\.md)$ {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400";
        }

        # GeoJSON files (from Next.js)
        location ~ \.geojson$ {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            add_header Content-Type application/geo+json;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Fallback to React SPA
        location / {
            proxy_pass http://react_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Development server (no SSL)
    server {
        listen 80;
        server_name localhost 127.0.0.1;

