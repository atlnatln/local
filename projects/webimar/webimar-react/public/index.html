<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Tarım İmar - Tarımsal arazilerde yapılaşma süreçlerinde güncel mevzuata ve bilimsel esaslara uygun, güvenilir ve hızlı hesaplama çözümleri."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Performance optimized Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" 
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    </noscript>
    
    <!-- Leaflet CSS - Local (Performance Optimized) -->
    <link rel="preload" href="%PUBLIC_URL%/leaflet.css" as="style" />
    <link rel="stylesheet" href="%PUBLIC_URL%/leaflet.css" />
    
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Tarım İmar - Tarımsal Yapılaşma Hesaplama Sistemi</title>
    <link rel="canonical" href="%PUBLIC_URL%/" />
    
    <!-- Runtime Environment Configuration -->
    <script>
      // Determine environment based on port and URL structure
      const hostname = window.location.hostname;
      const port = window.location.port;
      const pathname = window.location.pathname;
      
      // Production: Any non-localhost domain (e.g. tarimimar.com.tr or IP)
      const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
      // Docker development: localhost without port (nginx proxy) OR URL başında /hesaplama OR /havza-bazli-destekleme-modeli gibi Next.js pages
      const isDockerDev = isLocalhost && !port;
      
      // Determine environment type
      let envType = 'NATIVE';
      if (!isLocalhost) envType = 'PRODUCTION';
      else if (isDockerDev) envType = 'DOCKER';

      const runtimeBasename = pathname.startsWith('/hesaplama/') || pathname === '/hesaplama'
        ? '/hesaplama'
        : '';

      console.log('Environment detected:', envType, 'for', location.href);
      
      // Set environment variables immediately
      if (envType === 'PRODUCTION') {
        // Production (VPS/Domain)
        const origin = window.location.origin; // e.g. https://tarimimar.com.tr
        window._webimar_env = {
          REACT_APP_API_BASE_URL: origin + '/api',
          REACT_APP_ROUTER_BASENAME: runtimeBasename,
          REACT_APP_NEXTJS_URL: origin,
          NODE_ENV: 'production'
        };
        window.WEBIMAR_API_BASE_URL = origin + '/api';
      } else if (envType === 'DOCKER') {
        // Docker Local Development
        window._webimar_env = {
          REACT_APP_API_BASE_URL: 'http://localhost/api',
          REACT_APP_ROUTER_BASENAME: runtimeBasename,
          REACT_APP_NEXTJS_URL: 'http://localhost',
          NODE_ENV: 'development'
        };
        window.WEBIMAR_API_BASE_URL = 'http://localhost/api';
      } else {
        // Native Local Development
        window._webimar_env = {
          REACT_APP_API_BASE_URL: 'http://localhost:8000/api',
          REACT_APP_ROUTER_BASENAME: '',
          REACT_APP_NEXTJS_URL: 'http://localhost:3000',
          NODE_ENV: 'development'
        };
        window.WEBIMAR_API_BASE_URL = 'http://localhost:8000/api';
      }
      
      console.log('Environment variables set:', window._webimar_env);
      
      // Register Service Worker for performance caching
      if ('serviceWorker' in navigator && window.location.hostname !== 'localhost') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

      This HTML file is a template.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
