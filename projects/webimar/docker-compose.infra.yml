services:
  nginx:
    profiles:
      - local-only
    networks:
      default: null
      vps_network:
        aliases:
          - webimar-nginx

  webimar-nginx:
    image: nginx:1.24-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - webimar-api
      - webimar-nextjs
      - webimar-react
    networks:
      default: null
      vps_network:
        aliases:
          - webimar-nginx
    restart: unless-stopped

  webimar-api:
    networks:
      - default
      - vps_network

  webimar-react:
    networks:
      - default
      - vps_network

  webimar-nextjs:
    networks:
      - default
      - vps_network

networks:
  vps_network:
    external: true
    name: vps_infrastructure_network
