<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sayı Yolculuğu — Seviye Editörü</title>
<link rel="stylesheet" href="css/base.css">
<style>
/* Editor specific styles */
.editor-container { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 16px; }
.editor-header { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; align-items: center; width: 100%; max-width: 800px; }
.editor-header label { font-size: .85rem; color: var(--text-dim); }
.editor-header input, .editor-header select { background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: 6px 10px; font-size: .85rem; }
.toolbox { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.tool-btn { padding: 8px 14px; border-radius: 8px; border: 2px solid rgba(255,255,255,.15); background: var(--surface); color: var(--text); font-size: .85rem; cursor: pointer; transition: all .15s; }
.tool-btn:hover { border-color: var(--accent); }
.tool-btn.active { background: var(--accent); border-color: var(--primary); color: #fff; }
#editorGrid { display: grid; gap: 4px; background: var(--surface2); padding: 16px; border-radius: var(--radius); }
.editor-cell { width: 48px; height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; background: rgba(255,255,255,.04); border: 2px solid transparent; transition: all .15s; }
.editor-cell:hover { border-color: var(--accent); }
.editor-cell.wall { background: #2a2a40; }
.editor-cell.start { background: rgba(233,69,96,.25); border-color: var(--primary); }
.editor-cell.target { background: rgba(0,214,143,.2); border-color: var(--green); }
.editor-cell.op-plus { background: rgba(59,130,246,.2); color: var(--blue); }
.editor-cell.op-minus { background: rgba(233,69,96,.2); color: var(--primary); }
.editor-cell.op-times { background: rgba(245,197,24,.2); color: var(--gold); }
.editor-cell.op-divide { background: rgba(255,87,34,.2); color: #FF5722; }
.editor-cell.op-square { background: rgba(156,39,176,.2); color: #9C27B0; }
.editor-cell.lock { background: rgba(245,197,24,.15); color: var(--gold); font-size: .75rem; }
.editor-cell.teleport { background: rgba(156,39,176,.15); color: #9C27B0; }
.editor-cell.restart { background: rgba(233,69,96,.15); color: var(--primary); }
.op-config, .lock-config, .teleport-config { display: none; gap: 8px; align-items: center; margin-top: 8px; }
.op-config.active, .lock-config.active, .teleport-config.active { display: flex; }
.editor-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.editor-actions button { padding: 10px 20px; border-radius: 10px; border: none; font-size: .9rem; font-weight: 700; cursor: pointer; }
.btn-test { background: linear-gradient(135deg, var(--green), #00b377); color: #000; }
.btn-export { background: var(--accent); color: #fff; }
.btn-import { background: var(--surface); color: var(--text); border: 1px solid var(--accent); }
.btn-back-link { background: rgba(255,255,255,.1); color: var(--text); text-decoration: none; padding: 10px 20px; border-radius: 10px; font-size: .9rem; }
#testArea { display: none; margin-top: 16px; }
#jsonOutput { width: 100%; max-width: 600px; min-height: 120px; background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: 10px; font-family: monospace; font-size: .8rem; }
</style>
</head>
<body>
<div class="editor-container">
  <h1>🛠️ Seviye Editörü</h1>
  <div class="editor-header">
    <label>Boyut: <input type="number" id="gridCols" value="5" min="1" max="10" style="width:50px;"></label>
    <label>× <input type="number" id="gridRows" value="5" min="1" max="10" style="width:50px;"></label>
    <label>Başlangıç Değeri: <input type="number" id="startVal" value="1" min="-99" max="99" style="width:60px;"></label>
    <label>Hedef Değeri: <input type="number" id="targetValInput" placeholder="Yok" style="width:60px;"></label>
    <label>Max Komut: <input type="number" id="maxCmds" value="10" min="1" max="50" style="width:60px;"></label>
  </div>

  <div class="toolbox">
    <button class="tool-btn active" data-tool="start">🚀 Başlangıç</button>
    <button class="tool-btn" data-tool="target">🎯 Hedef</button>
    <button class="tool-btn" data-tool="wall">🧱 Duvar</button>
    <button class="tool-btn" data-tool="op">➕ Op</button>
    <button class="tool-btn" data-tool="lock">🔒 Kilit</button>
    <button class="tool-btn" data-tool="teleport">🌀 Teleport</button>
    <button class="tool-btn" data-tool="restart">↺ Restart</button>
    <button class="tool-btn" data-tool="eraser">🗑 Sil</button>
  </div>

  <div class="op-config" id="opConfig">
    <label>Op: <select id="opType"><option value="+">+</option><option value="-">-</option><option value="×">×</option><option value="/">/</option><option value="^">^</option></select></label>
    <label>Değer: <input type="number" id="opVal" value="1" min="1" max="99" style="width:60px;"></label>
  </div>
  <div class="lock-config" id="lockConfig">
    <label>Gerekli Değer: <input type="number" id="lockVal" value="5" min="1" max="99" style="width:60px;"></label>
  </div>
  <div class="teleport-config" id="teleportConfig">
    <label>Hedef X: <input type="number" id="tpX" value="0" min="0" max="9" style="width:50px;"></label>
    <label>Y: <input type="number" id="tpY" value="0" min="0" max="9" style="width:50px;"></label>
  </div>

  <div class="editor-actions">
    <button class="btn-test" id="btnTest">▶ Test Et</button>
    <button class="btn-export" id="btnExport">📤 JSON Export</button>
    <button class="btn-import" id="btnImport">📥 JSON Import</button>
    <a href="index.html" class="btn-back-link">← Oyuna Dön</a>
  </div>

  <div id="editorGrid"></div>

  <textarea id="jsonOutput" placeholder="JSON çıktısı burada görünecek..."></textarea>
</div>

<script type="module" src="js/editor.js"></script>
</body>
</html>
