<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<title>Sayı Yolculuğu</title>
<style>
/* ═══════════════════════════════════════════════════════════
   Sayı Yolculuğu — Tek Dosya Oyun
   ═══════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --primary: #e94560;
  --secondary: #0f3460;
  --accent: #533483;
  --gold: #f5c518;
  --green: #00d68f;
  --blue: #3b82f6;
  --text: #e8e8e8;
  --text-dim: #8888aa;
  --cell-size: 64px;
  --radius: 12px;
}

html { font-size: 16px; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  user-select: none;
  overscroll-behavior: none;
}

/* ── Intro / Splash ───────────────────────────────────────── */
#splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
  transition: opacity .6s;
}
#splash.hidden { opacity: 0; pointer-events: none; }
#splash h1 { font-size: 3rem; margin-bottom: .25rem; }
#splash h1 span { color: var(--gold); }
#splash p { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 2rem; }

.age-select { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
.age-btn {
  padding: 12px 22px; border-radius: var(--radius); border: 2px solid var(--accent);
  background: transparent; color: var(--text); font-size: 1rem; cursor: pointer;
  transition: all .2s;
}
.age-btn:hover, .age-btn.active { background: var(--accent); border-color: var(--primary); transform: scale(1.05); }

.start-btn {
  padding: 16px 48px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}
.start-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(233,69,96,.4); }

.splash-features {
  display: flex; gap: 16px; margin-top: 1.5rem;
}
.splash-features span {
  font-size: 0.8rem; color: var(--text-dim);
  padding: 6px 12px; border-radius: 20px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.08);
}

/* ── Game Layout ──────────────────────────────────────────── */
#game { display: none; }
#game.active { display: flex; flex-direction: column; min-height: 100vh; }

/* Header */
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,.06);
  flex-shrink: 0;
}
.game-header .level-info { display: flex; align-items: center; gap: 12px; }
.game-header .level-badge {
  background: var(--accent); padding: 4px 14px; border-radius: 20px;
  font-weight: 700; font-size: .9rem;
}
.game-header .level-title { font-size: 1rem; color: var(--text-dim); }
.game-header .stars { font-size: 1.4rem; letter-spacing: 2px; }
.game-header .btn-back {
  background: none; border: 1px solid var(--text-dim); color: var(--text-dim);
  padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: .85rem;
}
.game-header .btn-back:hover { border-color: var(--primary); color: var(--primary); }

/* Main area */
.game-main {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; gap: 16px; padding: 12px;
  overflow-y: auto;
}

/* ── Goal indicator ───────────────────────────────────────── */
.goal-bar {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px 20px;
  display: flex; align-items: center; gap: 16px;
  width: 100%; max-width: 600px;
}
.goal-bar .goal-icon { font-size: 1.8rem; }
.goal-bar .goal-text { flex: 1; }
.goal-bar .goal-text strong { color: var(--green); }
.goal-bar .goal-text .goal-desc { font-size: .85rem; color: var(--text-dim); }

/* ── Grid ─────────────────────────────────────────────────── */
.grid-area {
  flex-shrink: 0;
}
.grid-container {
  position: relative;
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.grid {
  display: grid;
  gap: 4px;
}
.cell {
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.1rem; position: relative;
  transition: all .3s ease;
}
.cell.empty { background: rgba(255,255,255,.04); }
.cell.wall {
  background: #2a2a40;
  box-shadow: inset 0 2px 6px rgba(0,0,0,.5);
}
.cell.wall::after { content: '🧱'; font-size: 1.2rem; }
.cell.target {
  background: rgba(0, 214, 143, .15); border: 2px dashed var(--green);
}
.cell.target .target-value {
  position: absolute; font-size: .65rem; bottom: 2px; right: 4px;
  color: var(--green); opacity: .8; font-weight: 700;
}
.cell.op-plus { background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); color: var(--blue); }
.cell.op-minus { background: rgba(233,69,96,.15); border: 1px solid rgba(233,69,96,.3); color: var(--primary); }
.cell.op-times { background: rgba(245,197,24,.15); border: 1px solid rgba(245,197,24,.3); color: var(--gold); }
.cell.bump { animation: cellBump .3s ease; }
@keyframes cellBump {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); filter: brightness(1.5); }
}

/* Player number */
.player {
  position: absolute;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Roboto Mono', monospace;
  font-size: 1.6rem; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(233,69,96,.5);
  transition: all .35s cubic-bezier(.4, 0, .2, 1);
  z-index: 10;
}
.player.bump { animation: playerBump .3s ease; }
@keyframes playerBump {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); filter: brightness(1.8); }
}
.player.success { animation: successPulse .6s ease; }
@keyframes successPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(0,214,143,.5); background: linear-gradient(135deg, var(--primary), var(--accent)); }
  50% { box-shadow: 0 0 50px rgba(0,214,143,.9); transform: scale(1.2); background: linear-gradient(135deg, var(--green), #00b377); }
}

/* ── Command Panel ────────────────────────────────────────── */
.cmd-panel {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px; width: 100%; max-width: 600px;
}
.cmd-panel h3 { font-size: .7rem; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

.cmd-palette {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
  padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,.06);
}
.cmd-btn {
  padding: 10px 18px; border-radius: 10px; border: 2px solid transparent;
  font-size: .95rem; font-weight: 600; cursor: pointer;
  transition: all .15s; user-select: none;
  display: flex; align-items: center; gap: 4px;
}
.cmd-btn:active { transform: scale(.94); }
.cmd-btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
.cmd-btn.x-plus, .cmd-btn.x-minus { background: rgba(59,130,246,.2); color: var(--blue); border-color: rgba(59,130,246,.4); }
.cmd-btn.y-plus, .cmd-btn.y-minus { background: rgba(0,214,143,.2); color: var(--green); border-color: rgba(0,214,143,.4); }
.cmd-btn.z-plus { background: rgba(245,197,24,.2); color: var(--gold); border-color: rgba(245,197,24,.3); }
.cmd-btn.z-minus { background: rgba(233,69,96,.2); color: var(--primary); border-color: rgba(233,69,96,.3); }

.cmd-queue-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cmd-queue-label h3 { margin: 0; }
.cmd-queue-label .cmd-count { font-size: .8rem; color: var(--text-dim); }

.cmd-queue {
  display: flex; flex-wrap: wrap; gap: 6px;
  min-height: 48px; padding: 10px;
  background: rgba(0,0,0,.2); border-radius: 8px;
  border: 2px dashed rgba(255,255,255,.08);
  margin-bottom: 14px;
  align-content: flex-start;
}
.cmd-queue-empty {
  width: 100%; text-align: center; color: #555;
  font-size: .8rem; padding: 8px;
}
.cmd-queue .cmd-chip {
  padding: 6px 14px; border-radius: 8px;
  font-size: .85rem; font-weight: 600; cursor: pointer;
  transition: all .15s; position: relative; border: none;
  display: flex; align-items: center; gap: 3px;
}
.cmd-chip:hover { opacity: .7; transform: scale(1.05); }
.cmd-chip.x-plus, .cmd-chip.x-minus { background: rgba(59,130,246,.25); color: var(--blue); }
.cmd-chip.y-plus, .cmd-chip.y-minus { background: rgba(0,214,143,.25); color: var(--green); }
.cmd-chip.z-plus { background: rgba(245,197,24,.25); color: var(--gold); }
.cmd-chip.z-minus { background: rgba(233,69,96,.25); color: var(--primary); }
.cmd-chip.running { animation: chipPulse .5s ease infinite; }
.cmd-chip.done { opacity: .4; }
@keyframes chipPulse {
  0%, 100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
  50% { box-shadow: 0 0 12px rgba(255,255,255,.3); }
}

.cmd-actions { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
.action-btn {
  padding: 12px 8px; border-radius: 10px; border: none;
  font-size: .85rem; font-weight: 700; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.action-btn:active { transform: scale(.96); }
.action-btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
.btn-run { background: linear-gradient(135deg, var(--green), #00b377); color: #000; }
.btn-run:hover:not(:disabled) { box-shadow: 0 0 20px rgba(0,214,143,.4); }
.btn-clear { background: rgba(233,69,96,.2); color: var(--primary); }
.btn-clear:hover:not(:disabled) { background: rgba(233,69,96,.35); }
.btn-undo { background: rgba(255,255,255,.08); color: var(--text-dim); }
.btn-undo:hover:not(:disabled) { background: rgba(255,255,255,.12); }
.btn-reset { background: rgba(59,130,246,.2); color: var(--blue); }
.btn-reset:hover:not(:disabled) { background: rgba(59,130,246,.35); }

/* ── Level Complete Overlay ───────────────────────────────── */
#overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
}
#overlay.active { display: flex; }
.overlay-card {
  background: var(--surface);
  border-radius: 24px; padding: 40px 32px; text-align: center;
  max-width: 380px; width: 90%; animation: popIn .4s ease;
}
@keyframes popIn {
  0% { transform: scale(.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.overlay-card h2 { font-size: 2rem; margin-bottom: 8px; }
.overlay-card .overlay-stars { font-size: 2.5rem; margin-bottom: 12px; letter-spacing: 4px; display: flex; justify-content: center; gap: 8px; }
.star-anim { animation: starPop .4s ease both; }
@keyframes starPop {
  0% { transform: scale(0) rotate(-30deg); opacity: 0; }
  60% { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.overlay-card p { color: var(--text-dim); margin-bottom: 24px; }
.overlay-card .overlay-btns { display: flex; gap: 12px; justify-content: center; }
.overlay-card .overlay-btns button {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 28px; border-radius: 12px; border: none;
  font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .15s;
}
.overlay-card .btn-next { background: linear-gradient(135deg, var(--green), #00b377); color: #000; }
.overlay-card .btn-next:hover { transform: scale(1.04); }
.overlay-card .btn-retry { background: rgba(255,255,255,.1); color: var(--text); }
.overlay-card .btn-retry:hover { background: rgba(255,255,255,.18); transform: scale(1.04); }

/* Level select modal */
#levelSelect {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
}
#levelSelect.active { display: flex; }
.level-select-card {
  background: var(--surface); border-radius: 20px; padding: 24px;
  max-width: 420px; width: 90%; animation: popIn .4s ease;
}
.level-select-card h2 { margin-bottom: 20px; text-align: center; }
.level-select-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.level-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.level-cell {
  aspect-ratio: 1; border-radius: 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.1rem; cursor: pointer;
  background: rgba(255,255,255,.06); border: 2px solid transparent;
  transition: all .2s; color: var(--text);
}
.level-cell:hover:not(:disabled) { border-color: var(--accent); transform: scale(1.06); background: rgba(83,52,131,.2); }
.level-cell.completed { border-color: var(--green); background: rgba(0,214,143,.1); }
.level-cell.current { border-color: var(--gold); background: rgba(245,197,24,.1); }
.level-cell.locked { opacity: .3; cursor: not-allowed; }
.level-cell .lc-stars { font-size: .55rem; margin-top: 2px; letter-spacing: 1px; }
.level-select-close {
  display: block; margin: 20px auto 0; padding: 10px 30px;
  border-radius: 10px; border: 1px solid var(--text-dim); background: none;
  color: var(--text-dim); cursor: pointer; font-size: .9rem;
}
.level-select-close:hover { border-color: var(--primary); color: var(--primary); }

/* ── Sound Toggle ─────────────────────────────────────────── */
.sound-toggle {
  position: fixed; bottom: 12px; right: 12px; z-index: 50;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.15); background: rgba(26,26,46,.9);
  color: var(--text-dim); cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.sound-toggle:hover { border-color: var(--primary); color: var(--primary); }

/* ── Responsive ───────────────────────────────────────────── */
@media (max-width: 640px) {
  :root { --cell-size: 48px; }
  .cmd-btn { padding: 8px 12px; font-size: .8rem; }
  .overlay-card { padding: 28px 20px; }
  .cmd-actions { gap: 6px; }
  .action-btn { padding: 10px 6px; font-size: .75rem; }
  .level-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  #splash h1 { font-size: 2.2rem; }
}
@media (max-width: 360px) {
  :root { --cell-size: 40px; }
  .cmd-actions { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ─── SPLASH SCREEN ─────────────────────────────────────── -->
<div id="splash">
  <h1>🔢 <span>Sayı Yolculuğu</span></h1>
  <p>Sayıları hareket ettir, bulmacayı çöz!</p>

  <p style="color:var(--text-dim); font-size:.9rem; margin-bottom:8px;">Yaş grubunu seç:</p>
  <div class="age-select" id="ageSelect">
    <button class="age-btn" data-age="5-6">5-6</button>
    <button class="age-btn active" data-age="7-8">7-8</button>
    <button class="age-btn" data-age="9-10">9-10</button>
    <button class="age-btn" data-age="11-12">11-12</button>
  </div>

  <button class="start-btn" id="btnStart">🚀 Başla!</button>

  <div class="splash-features">
    <span>📐 32 Bulmaca</span>
    <span>🎯 4 Zorluk</span>
    <span>🧠 Programlama</span>
  </div>
</div>

<!-- ─── GAME SCREEN ───────────────────────────────────────── -->
<div id="game">
  <div class="game-header">
    <div class="level-info">
      <span class="level-badge" id="levelBadge">Seviye 1</span>
      <span class="level-title" id="levelTitle">İlk Adım</span>
    </div>
    <div class="stars" id="starsDisplay">☆☆☆</div>
    <div style="display:flex;gap:8px;">
      <button class="btn-back" id="btnLevels">📋 Seviyeler</button>
      <button class="btn-back" id="btnHome">🏠</button>
    </div>
  </div>

  <div class="game-main">
    <!-- Goal bar -->
    <div class="goal-bar">
      <div class="goal-icon">🎯</div>
      <div class="goal-text">
        <div id="goalDesc" class="goal-desc">Sayıyı hedef noktaya taşı</div>
        <div><strong id="goalDetail">3 → yeşil kare</strong></div>
      </div>
      <div id="moveCounter" style="font-size:.85rem;color:var(--text-dim);">0 / 5</div>
    </div>

    <!-- Grid -->
    <div class="grid-area">
      <div class="grid-container">
        <div class="grid" id="grid"></div>
        <div class="player" id="player">3</div>
      </div>
    </div>

    <!-- Command Panel -->
    <div class="cmd-panel">
      <h3>Komutlar</h3>
      <div class="cmd-palette" id="cmdPalette"></div>

      <div class="cmd-queue-label">
        <h3>Programın</h3>
        <span class="cmd-count" id="cmdCount">0 / 10</span>
      </div>
      <div class="cmd-queue" id="cmdQueue"></div>

      <div class="cmd-actions">
        <button class="action-btn btn-undo" id="btnUndo">↩ Geri Al</button>
        <button class="action-btn btn-clear" id="btnClear">🗑 Temizle</button>
        <button class="action-btn btn-reset" id="btnReset">🔄 Sıfırla</button>
        <button class="action-btn btn-run" id="btnRun">▶ Çalıştır</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── LEVEL COMPLETE OVERLAY ────────────────────────────── -->
<div id="overlay">
  <div class="overlay-card">
    <h2 id="overlayTitle">🎉 Tebrikler!</h2>
    <div class="overlay-stars" id="overlayStars">
      <span id="s1">☆</span><span id="s2">☆</span><span id="s3">☆</span>
    </div>
    <p id="overlayMsg">Harika! Bulmacayı çözdün!</p>
    <div class="overlay-btns">
      <button class="btn-retry" id="btnRetry">🔄 Tekrar</button>
      <button class="btn-next" id="btnNext">▶ Sonraki</button>
    </div>
  </div>
</div>

<!-- ─── LEVEL SELECT ──────────────────────────────────────── -->
<div id="levelSelect">
  <div class="level-select-card">
    <div class="level-select-header">
      <h2>Seviye Seç</h2>
      <button class="btn-back" id="btnCloseLevels" style="margin:0;">✕</button>
    </div>
    <div class="level-grid" id="levelGrid"></div>
    <button class="level-select-close" id="btnCloseLevels2">Kapat</button>
  </div>
</div>

<!-- ─── SOUND TOGGLE ──────────────────────────────────────── -->
<button class="sound-toggle" id="btnSound" title="Sesi Aç/Kapat">🔊</button>

<script>
/* ═══════════════════════════════════════════════════════════
   Sayı Yolculuğu — Game Engine (Geliştirilmiş)
   ═══════════════════════════════════════════════════════════ */

// ── Command definitions ──────────────────────────────────
const CMDS = {
  'x+': { label: 'x \u2192', css: 'x-plus',  dx: 1,  dy: 0,  dz: 0 },
  'x-': { label: '\u2190 x', css: 'x-minus', dx: -1, dy: 0,  dz: 0 },
  'y-': { label: 'y \u2191', css: 'y-minus', dx: 0,  dy: -1, dz: 0 },
  'y+': { label: '\u2193 y', css: 'y-plus',  dx: 0,  dy: 1,  dz: 0 },
  'z+': { label: 'z +1', css: 'z-plus',  dx: 0,  dy: 0,  dz: 1 },
  'z-': { label: 'z -1', css: 'z-minus', dx: 0,  dy: 0,  dz: -1 },
};

const ICONS = {
  'x+': '\u2192', 'x-': '\u2190', 'y-': '\u2191', 'y+': '\u2193', 'z+': '+', 'z-': '-'
};

// ── Level data (32 seviye) ───────────────────────────────
const LEVELS_BY_AGE = {

'5-6': [
  { title: '\u0130lk Ad\u0131m', desc: 'Say\u0131y\u0131 sa\u011fa ta\u015f\u0131!', cols: 3, rows: 1, startX: 0, startY: 0, startVal: 1, targetX: 2, targetY: 0, targetVal: null, walls: [], ops: [], commands: ['x+'], maxCmds: 4, stars: [2, 3] },

// ── State ────────────────────────────────────────────────
let state = {
  ageGroup: '7-8',
  levelIdx: 0,
  playerX: 0, playerY: 0, playerVal: 0,
  queue: [],
  running: false,
  currentStep: -1,
  progress: {},
  soundOn: true,
};

// ── DOM refs ─────────────────────────────────────────────
const $ = id => document.getElementById(id);
const splash = $('splash');
const gameEl = $('game');
const gridEl = $('grid');
const playerEl = $('player');
const cmdPalette = $('cmdPalette');
const cmdQueue = $('cmdQueue');
const cmdCount = $('cmdCount');
const overlay = $('overlay');
const levelSelect = $('levelSelect');

// ── Audio Context ────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type = 'sine', vol = 0.15) {
  if (!state.soundOn || !audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playMove()    { playTone(440,  0.12, 'sine',   0.1); }
function playOp()      { playTone(660,  0.2,  'triangle', 0.12); }
function playBump()    { playTone(180,  0.25, 'sawtooth', 0.08); }
function playWin()     { playTone(523, 0.15); setTimeout(()=>playTone(659,0.15),150); setTimeout(()=>playTone(784,0.3),300); }
function playFail()    { playTone(330, 0.3, 'sawtooth', 0.08); setTimeout(()=>playTone(280,0.4),200); }
function playDrop()    { playTone(600, 0.08, 'sine', 0.08); }
function playRemove()  { playTone(400, 0.08, 'sine', 0.08); }
function playRun()     { playTone(500, 0.1); setTimeout(()=>playTone(700,0.1),100); }

// ── Helpers ──────────────────────────────────────────────
function getLevels() { return LEVELS_BY_AGE[state.ageGroup] || []; }
function getLevel()  { return getLevels()[state.levelIdx]; }

function loadProgress() {
  try { state.progress = JSON.parse(localStorage.getItem('sy_progress') || '{}'); } catch { state.progress = {}; }
}
function saveProgress() {
  localStorage.setItem('sy_progress', JSON.stringify(state.progress));
}

// ── Splash ───────────────────────────────────────────────

    btn.classList.add('active');

  splash.classList.add('hidden');

  $('btnSound').textContent = state.soundOn ? '🔊' : '🔇';
});

// ── Level loading ────────────────────────────────────────
function loadLevel(idx) {
  if (idx !== undefined) state.levelIdx = idx;
  const lv = getLevel();
  if (!lv) return;

  state.playerX = lv.startX;
  state.playerY = lv.startY;
  state.playerVal = lv.startVal;
  state.queue = [];
  state.running = false;
  state.currentStep = -1;

  $('levelBadge').textContent = 'Seviye ' + (state.levelIdx + 1);
  $('levelTitle').textContent = lv.title;
  updateStarsDisplay(0);

  $('goalDesc').textContent = lv.desc;
  const valText = lv.targetVal != null ? ' = ' + lv.targetVal : '';
  $('goalDetail').textContent = lv.startVal + valText + ' \u2192 hedef';
  $('moveCounter').textContent = '0 / ' + lv.maxCmds;

  buildGrid(lv);
  updatePlayerPos(false);
  buildPalette(lv);
  renderQueue();
  $('btnRun').disabled = false;
  playerEl.classList.remove('success');
}

function calcCellSize(lv) {
  const max = Math.max(lv.cols, lv.rows);
  if (max <= 3) return 72;
  if (max <= 5) return 56;
  if (max <= 7) return 44;
  return 36;
}

function buildGrid(lv) {
  gridEl.innerHTML = '';
  const cellSize = calcCellSize(lv);
  gridEl.style.gridTemplateColumns = 'repeat(' + lv.cols + ', ' + cellSize + 'px)';

  const wallSet = new Set();
  lv.walls.forEach(w => wallSet.add(w[0] + ',' + w[1]));
  const opMap = {};
  lv.ops.forEach(o => { opMap[o.x + ',' + o.y] = o; });

  for (let r = 0; r < lv.rows; r++) {
    for (let c = 0; c < lv.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = c;
      cell.dataset.y = r;
      cell.style.width = cellSize + 'px';
      cell.style.height = cellSize + 'px';

      const key = c + ',' + r;

      if (wallSet.has(key)) {
        cell.classList.add('wall');
      } else if (c === lv.targetX && r === lv.targetY) {
        cell.classList.add('target');
        if (lv.targetVal != null) {
          const tv = document.createElement('span');
          tv.className = 'target-value';
          tv.textContent = '= ' + lv.targetVal;
          cell.appendChild(tv);
        }
        cell.appendChild(document.createTextNode('\ud83c\udfaf'));
      } else if (opMap[key]) {
        const op = opMap[key];
        if (op.type === '+') cell.classList.add('op-plus');
        else if (op.type === '-') cell.classList.add('op-minus');
        else if (op.type === '\u00d7') cell.classList.add('op-times');
        cell.textContent = op.type + op.val;
      } else {
        cell.classList.add('empty');
      }

      gridEl.appendChild(cell);
    }
  }

  const gap = 4;
  playerEl.style.width = cellSize + 'px';
  playerEl.style.height = cellSize + 'px';
  playerEl.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
}

function updatePlayerPos(animate) {
  const lv = getLevel();
  const cellSize = calcCellSize(lv);
  const gap = 4;
  const left = state.playerX * (cellSize + gap);
  const top = state.playerY * (cellSize + gap);

  playerEl.style.transform = 'translate(' + left + 'px, ' + top + 'px)';
  playerEl.textContent = state.playerVal;

  if (animate) {
    playerEl.classList.remove('bump');
    void playerEl.offsetWidth;
    playerEl.classList.add('bump');
    setTimeout(() => playerEl.classList.remove('bump'), 300);
  }
}

function buildPalette(lv) {
  cmdPalette.innerHTML = '';
  lv.commands.forEach(cmdId => {
    const cmd = CMDS[cmdId];
    if (!cmd) return;
    const btn = document.createElement('button');
    btn.className = 'cmd-btn ' + cmd.css;
    btn.innerHTML = '<span>' + (ICONS[cmdId] || '') + '</span> ' + cmd.label;
    btn.addEventListener('click', () => addCommand(cmdId));
    cmdPalette.appendChild(btn);
  });
}

// ── Command queue ────────────────────────────────────────
function addCommand(cmdId) {
  const lv = getLevel();
  if (state.running || state.queue.length >= lv.maxCmds) return;
  state.queue.push(cmdId);
  playDrop();
  renderQueue();
}

function renderQueue() {
  const lv = getLevel();
  cmdQueue.innerHTML = '';
  if (state.queue.length === 0) {
    cmdQueue.innerHTML = '<div class="cmd-queue-empty">Komutlar\u0131 buraya ekle...</div>';
  } else {
    state.queue.forEach((cmdId, i) => {
      const cmd = CMDS[cmdId];
      if (!cmd) return;
      const chip = document.createElement('button');
      chip.className = 'cmd-chip ' + cmd.css;
      if (state.running && state.currentStep === i) chip.classList.add('running');
      if (state.running && state.currentStep > i) chip.classList.add('done');
      chip.innerHTML = '<span>' + (ICONS[cmdId] || '') + '</span> ' + cmd.label;
      chip.dataset.index = i;
      if (!state.running) {
        chip.addEventListener('click', () => {
          state.queue.splice(i, 1);
          playRemove();
          renderQueue();
        });
      }
      cmdQueue.appendChild(chip);
    });
  }
  cmdCount.textContent = state.queue.length + ' / ' + lv.maxCmds;
}

// ── Execution ────────────────────────────────────────────
$('btnRun').addEventListener('click', runProgram);
$('btnClear').addEventListener('click', () => { if (!state.running) { state.queue = []; renderQueue(); } });
$('btnUndo').addEventListener('click', () => { if (!state.running) { state.queue.pop(); renderQueue(); } });
$('btnReset').addEventListener('click', () => { if (!state.running) loadLevel(); });

async function runProgram() {
  if (state.running || state.queue.length === 0) return;
  ensureAudio();
  playRun();
  state.running = true;
  $('btnRun').disabled = true;

  const lv = getLevel();
  state.playerX = lv.startX;
  state.playerY = lv.startY;
  state.playerVal = lv.startVal;
  state.currentStep = -1;
  updatePlayerPos(false);
  playerEl.classList.remove('success');

  await sleep(200);

  let px = lv.startX, py = lv.startY, pval = lv.startVal;

  for (let i = 0; i < state.queue.length; i++) {
    if (!state.running) break;

    const cmdId = state.queue[i];
    const cmd = CMDS[cmdId];
    if (!cmd) continue;

    state.currentStep = i;
    renderQueue();

    // Z operations - value only
    if (cmd.dz !== 0) {
      pval += cmd.dz;
      state.playerVal = pval;
      playerEl.textContent = pval;
      playMove();
      await sleep(400);
      continue;
    }

    const nx = px + cmd.dx;
    const ny = py + cmd.dy;

    // Bounds check
    if (nx < 0 || nx >= lv.cols || ny < 0 || ny >= lv.rows) {
      playerEl.classList.add('bump');
      playBump();
      await sleep(200);
      playerEl.classList.remove('bump');
      await sleep(150);
      continue;
    }

    // Wall check
    const isWall = lv.walls.some(w => w[0] === nx && w[1] === ny);
    if (isWall) {
      playerEl.classList.add('bump');
      playBump();
      await sleep(200);
      playerEl.classList.remove('bump');
      await sleep(150);
      continue;
    }

    // Move
    px = nx; py = ny;
    state.playerX = px;
    state.playerY = py;

    // Operator cell
    const op = lv.ops.find(o => o.x === nx && o.y === ny);
    if (op) {
      if (op.type === '+') pval += op.val;
      else if (op.type === '-') pval -= op.val;
      else if (op.type === '\u00d7') pval *= op.val;
      state.playerVal = pval;
      playOp();
    } else {
      playMove();
    }

    updatePlayerPos(true);
    await sleep(400);
  }

  state.currentStep = -1;
  renderQueue();
  await sleep(200);
  checkWin(px, py, pval);
}

function checkWin(px, py, pval) {
  const lv = getLevel();
  const posOk = px === lv.targetX && py === lv.targetY;
  const valOk = lv.targetVal == null || pval === lv.targetVal;

  if (posOk && valOk) {
    const usedCmds = state.queue.length;
    let stars = 1;
    if (usedCmds <= lv.stars[0]) stars = 3;
    else if (usedCmds <= lv.stars[1]) stars = 2;

    playWin();
    playerEl.classList.add('success');
    setTimeout(() => {
      playerEl.classList.remove('success');
      showWinOverlay(stars);
    }, 600);

    const prog = state.progress[state.ageGroup] || {};
    const prev = prog[state.levelIdx];
    if (!prev || prev.stars < stars) {
      prog[state.levelIdx] = { completed: true, stars };
      state.progress[state.ageGroup] = prog;
      saveProgress();
    }
  } else {
    playFail();
    $('overlayTitle').textContent = '\ud83d� Hedefine ula\u015famad\u0131n';
    $('overlayTitle').style.color = '#e94560';
    document.getElementById('s1').textContent = '\u2606';
    document.getElementById('s2').textContent = '\u2606';
    document.getElementById('s3').textContent = '\u2606';
    document.getElementById('s1').className = '';
    document.getElementById('s2').className = '';
    document.getElementById('s3').className = '';
    $('overlayMsg').textContent = (posOk && !valOk)
      ? 'Say\u0131n ' + pval + ' \u2014 ama hedef ' + lv.targetVal + ' olmal\u0131yd\u0131.'
      : 'Do\u011fru konuma ula\u015famad\u0131n. Tekrar dene!';
    $('btnNext').style.display = 'none';
    overlay.classList.add('active');
  }

  state.running = false;
  $('btnRun').disabled = false;
}

function showWinOverlay(stars) {
  const levels = getLevels();
  $('overlayTitle').textContent = '\ud83c\udf89 Tebrikler!';
  $('overlayTitle').style.color = '#00d68f';

  const s1 = document.getElementById('s1');
  const s2 = document.getElementById('s2');
  const s3 = document.getElementById('s3');

  s1.textContent = stars >= 1 ? '\u2605' : '\u2606';
  s2.textContent = stars >= 2 ? '\u2605' : '\u2606';
  s3.textContent = stars >= 3 ? '\u2605' : '\u2606';
  s1.className = stars >= 1 ? 'star-anim' : '';
  s2.className = stars >= 2 ? 'star-anim' : '';
  s3.className = stars >= 3 ? 'star-anim' : '';
  s1.style.animationDelay = '0s';
  s2.style.animationDelay = '0.15s';
  s3.style.animationDelay = '0.3s';

  const msgs = ['\u0130yi i\u015f! Devam et! \ud83d\udcaa', 'Harika! \u00c7ok iyi gidiyorsun! \ud83c\udf1f', 'M\u00fckemmel! Tam puan! \ud83c\udfc6'];
  $('overlayMsg').textContent = msgs[stars - 1];
  $('btnNext').style.display = state.levelIdx < levels.length - 1 ? '' : 'none';
  overlay.classList.add('active');
}

$('btnRetry').addEventListener('click', () => {
  overlay.classList.remove('active');
  loadLevel();
});

$('btnNext').addEventListener('click', () => {
  overlay.classList.remove('active');
  if (state.levelIdx < getLevels().length - 1) {
    state.levelIdx++;
    loadLevel();
  }
});

function updateStarsDisplay(stars) {
  const prog = (state.progress[state.ageGroup] || {})[state.levelIdx];
  const s = prog ? prog.stars : 0;
  let txt = '';
  for (let i = 0; i < 3; i++) txt += (i < s) ? '\u2605' : '\u2606';
  $('starsDisplay').textContent = txt;
}

// ── Level Select ─────────────────────────────────────────
$('btnLevels').addEventListener('click', showLevelSelect);
$('btnCloseLevels').addEventListener('click', () => levelSelect.classList.remove('active'));
$('btnCloseLevels2').addEventListener('click', () => levelSelect.classList.remove('active'));

function showLevelSelect() {
  const levels = getLevels();
  const prog = state.progress[state.ageGroup] || {};
  const grid = $('levelGrid');
  grid.innerHTML = '';

  levels.forEach((lv, i) => {
    const cell = document.createElement('button');
    cell.className = 'level-cell';

    const unlocked = i === 0 || (prog[i - 1] && prog[i - 1].completed);
    if (!unlocked) cell.classList.add('locked');
    if (prog[i] && prog[i].completed) cell.classList.add('completed');
    if (i === state.levelIdx) cell.classList.add('current');

    if (!unlocked) {
      cell.innerHTML = '\ud83d\udd12';
    } else {
      const num = document.createElement('span');
      num.className = 'level-num';
      num.textContent = i + 1;
      cell.appendChild(num);
      if (prog[i]) {
        const stars = document.createElement('span');
        stars.className = 'lc-stars';
        let txt = '';
        for (let s = 0; s < 3; s++) txt += (s < prog[i].stars) ? '\u2605' : '\u2606';
        stars.textContent = txt;
        cell.appendChild(stars);
      }
    }

    if (unlocked) {
      cell.addEventListener('click', () => {
        state.levelIdx = i;
        levelSelect.classList.remove('active');
        loadLevel();
      });
    }

    grid.appendChild(cell);
  });

  levelSelect.classList.add('active');
}

// ── Utility ──────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
