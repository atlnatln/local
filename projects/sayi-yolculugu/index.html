<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<title>Sayı Yolculuğu — Test</title>
<link rel="stylesheet" href="css/game.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     Browser Test Skeleton — Android motorunun web test alanı
     ═══════════════════════════════════════════════════════════ -->

<div id="game">
  <div class="game-header">
    <div class="level-info">
      <span class="set-badge" id="setBadge" style="display:none;"></span>
      <span class="level-badge" id="levelBadge">Seviye 1</span>
      <span class="level-title" id="levelTitle"></span>
    </div>
    <div class="stars" id="starsDisplay">⭐⭐⭐</div>
    <button class="level-badge" id="btnLevels" style="cursor:pointer;background:var(--secondary);">📋</button>
  </div>

  <div class="game-main">
    <div class="goal-bar">
      <div class="goal-icon">🎯</div>
      <div class="goal-text">
        <div id="goalDesc" class="goal-desc"></div>
        <div><strong id="goalDetail"></strong></div>
      </div>
      <div id="moveCounter" style="font-size:.8rem;color:var(--text-dim);">0 / 5</div>
    </div>

    <div class="grid-container">
      <div class="grid" id="grid"></div>
      <div class="player" id="player">3</div>
    </div>

    <div class="cmd-panel">
      <h3>Komutlar</h3>
      <div class="cmd-palette" id="cmdPalette"></div>
      <div class="cmd-queue-label">
        <h3>Programın</h3>
        <span class="cmd-count" id="cmdCount">0 / 10</span>
      </div>
      <div class="cmd-queue" id="cmdQueue"></div>
      <div class="cmd-actions">
        <button class="action-btn btn-undo" id="btnUndo">↩</button>
        <button class="action-btn btn-clear" id="btnClear">🗑</button>
        <button class="action-btn btn-reset" id="btnReset">🔄</button>
        <button class="action-btn btn-run" id="btnRun">▶ Çalıştır</button>
      </div>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="overlay-card">
    <h2 id="overlayTitle">🎉 Tebrikler!</h2>
    <div class="overlay-stars" id="overlayStars">⭐⭐⭐</div>
    <p id="overlayMsg"></p>
    <div class="overlay-btns">
      <button class="btn-retry" id="btnRetry">🔄 Tekrar</button>
      <button class="btn-next" id="btnNext">▶ Sonraki</button>
    </div>
  </div>
</div>

<div id="levelSelect">
  <div class="level-select-card">
    <h2>Seviye Seç</h2>
    <div class="level-grid" id="levelGrid"></div>
    <button class="level-select-close" id="btnCloseLevels">Kapat</button>
  </div>
</div>

<div id="allComplete">
  <h1 id="allCompleteTitle">🏆 Harika!</h1>
  <div class="total-stars" id="totalStarsText"></div>
  <p id="allCompleteMsg">Tüm seviyeleri tamamladın!</p>
  <div id="allCompleteSpinner" style="display:none; margin: 16px 0; font-size: 1.2rem;">⏳ Yeni seviyeler hazırlanıyor, lütfen bekleyin...</div>
  <button id="btnFinish">Tamam</button>
  <button id="btnBuyCredits" style="display:none; margin-top: 12px; background: linear-gradient(135deg, #ffd700, #ff8c00);">💎 Kredi Satın Al</button>
</div>

<!-- Browser test stub: Android bridge mock + auto-start -->
<script>
window.Android = {
  onGameEvent: function(event, dataJson) {
    console.log('[BrowserStub] Event:', event, JSON.parse(dataJson));
  }
};

document.addEventListener('DOMContentLoaded', function() {
  if (typeof LEVELS_BY_AGE !== 'undefined') {
    var ageGroup = '7-8';
    var levels = LEVELS_BY_AGE[ageGroup] || [];
    if (levels.length > 0) {
      console.info('[BrowserStub] Auto-starting level 0, ageGroup=' + ageGroup);
      initGame(JSON.stringify({
        levels: levels,
        locale: 'tr',
        forceClear: false
      }));
    } else {
      console.warn('[BrowserStub] No levels found for ageGroup=' + ageGroup);
    }
  } else {
    console.warn('[BrowserStub] LEVELS_BY_AGE not loaded. Is levels-data.js included?');
  }
});
</script>

<!-- Level data (must load before game modules) -->
<script src="js/levels-data.js"></script>

<!-- Game engine modules (same as Android asset) -->
<script src="js/game-i18n.js"></script>
<script src="js/game-cmds.js"></script>
<script src="js/game-store.js"></script>
<script src="js/android-bridge.js"></script>
<script src="js/game-utils.js"></script>
<script src="js/game-grid-renderer.js"></script>
<script src="js/game-command-system.js"></script>
<script src="js/game-execution-engine.js"></script>
<script src="js/game-level-manager.js"></script>
<script src="js/game-ui-overlays.js"></script>
<script src="js/game-main.js"></script>
</body>
</html>
