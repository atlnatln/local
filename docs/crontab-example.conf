# ============================================================================
# VPS Crontab Configuration
# Automated tasks for backup, monitoring, and maintenance
# ============================================================================

# Backup automation - Run every day at 2 AM
0 2 * * * /home/akn/vps/scripts/backup-volumes.sh >> /var/log/vps-backup.log 2>&1

# SSL certificate check - Run every week on Sunday at 3 AM  
0 3 * * 0 docker exec vps_nginx_main nginx -s reload >> /var/log/nginx-reload.log 2>&1

# Docker system cleanup - Run every Sunday at 4 AM
0 4 * * 0 docker system prune -af --volumes=false >> /var/log/docker-cleanup.log 2>&1

# Log rotation check - Run every day at 1 AM
0 1 * * * docker exec vps_logrotate logrotate -f /etc/logrotate.conf >> /var/log/logrotate.log 2>&1

# Health check monitoring - Run every 5 minutes (optional)
# */5 * * * * curl -f http://localhost:8080/nginx-health > /dev/null 2>&1 || echo "$(date): Nginx health check failed" >> /var/log/health-check.log